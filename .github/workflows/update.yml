name: Update LongWin Data

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests tushare pandas

      - name: Fetch signals
        env:
          QIEMAN_TOKEN: ${{ secrets.QIEMAN_TOKEN }}
        run: python scripts/fetch_signals.py

      - name: Fetch NAV data
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/fetch_nav.py

      - name: Fetch content metadata
        run: python scripts/fetch_content.py

      - name: Fetch posts
        env:
          QIEMAN_TOKEN: ${{ secrets.QIEMAN_TOKEN }}
        run: python -u scripts/fetch_posts.py

      - name: Install markdownify
        run: pip install markdownify -q

      - name: Export posts to markdown
        run: python scripts/export_posts_md.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/nav/ docs/content.json docs/posts.json posts/
          git diff --staged --quiet || git commit -m "chore: update longwin data $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
          git push
