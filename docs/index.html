/* ── Allocation: 旭日图 (图3) — 真实 by_taxonomy 数据 ── */
// 3-step muted earth-tone ramp per L1: inner=L1 (deep) / mid=L2 / outer=L3 (light).
// Outer ring is the LAST shade — funds (L4 leaves) reuse L3 color, separated only by white border.
// Lightest shade is calibrated for #333 dark text contrast (NOT pushed further toward white).
// 同族不同支：海外新兴(深锚) 和 海外成熟(浅锚) 共享蓝绿色族，明度相邻。
const SUNBURST_PALETTE = {
  'A股':          ['#B85F5C', '#CC8987', '#E0B3B2'],  // dusty terracotta rose
  '海外新兴': ['#3F7C8F', '#6FA0AF', '#A0C5CF'],  // slate teal (deep anchor)
  '海外成熟': ['#5790A3', '#84B0BF', '#B5D0DA'],  // slate teal (light anchor — 同族 1 档)
  '商品':         ['#B5874E', '#CDA77D', '#E0C6AC'],  // muted ochre
  '债券':         ['#6B6B96', '#9494B5', '#BDBDD4'],  // slate violet
  '房地产':       ['#7E8E5E', '#A4B58A', '#C8D4B3'],  // muted sage
  '外汇':         ['#5C8B83', '#88AAA3', '#B5CBC4'],  // muted teal-green
  '现金':         ['#9C9588', '#BDB8AD', '#DCD8D0'],  // warm taupe
  '其他':         ['#8C8C8C', '#B0B0B0', '#D4D4D4'],  // neutral gray
};

function buildSunburstTree(byTaxonomy, cashUnits, totalMv) {
  // by_taxonomy: [{name, value, units, share_pct, color, children: L2[...]}]
  // L2/L3 nodes: {name, value, units, share_pct, children}
  // L3 leaves are funds: {name, code, value, units, share_pct, return_pct, status}
  // Drop status='cleared' leaves (value=0) so sunburst only shows live exposure.
  function pruneLeaves(node) {
    if (!node.children) return node;
    const live = node.children
      .filter(function(c) {
        if (c.status === 'cleared') return false;
        if (c.children) {
          const pc = pruneLeaves(c);
          return pc.children && pc.children.length > 0;
        }
        return c.value > 0.0001;
      })
      .map(pruneLeaves);
    return Object.assign({}, node, { children: live });
  }
  // Darken a hex color by `amt` (0-1) for tonal border that blends with the layer.
  function darken(hex, amt) {
    const m = hex.replace('#', '').match(/.{2}/g);
    if (!m) return hex;
    const ch = m.map(function(h) {
      const v = Math.max(0, Math.round(parseInt(h, 16) * (1 - amt)));
      return v.toString(16).padStart(2, '0');
    });
    return '#' + ch.join('');
  }

  // Recursively colorize: depth 0=L1 / 1=L2 / 2=L3. Stop at L3 — drop fund leaves entirely.
  // Border = same hue, ~15% darker → tonal separation without harsh white lines.
  function colorize(node, palette, depth) {
    const idx = Math.min(depth, palette.length - 1);
    const color = palette[idx];
    const labelColor = depth <= 1 ? '#ffffff' : '#333333';
    const out = Object.assign({}, node, {
      itemStyle: { color: color, borderColor: darken(color, 0.10), borderWidth: 1 },
      label: { color: labelColor },
    });
    if (depth < 2 && node.children && node.children.length) {
      out.children = node.children.map(function(c) { return colorize(c, palette, depth + 1); });
    } else {
      delete out.children;
    }
    return out;
  }

  const data = byTaxonomy
    .map(pruneLeaves)
    .filter(function(l1) { return (l1.children || []).length > 0; })
    .map(function(l1) {
      const palette = SUNBURST_PALETTE[l1.name] || SUNBURST_PALETTE['其他'];
      return colorize(l1, palette, 0);
    });

  // Cash: synthesize 3-deep chain (L1→L2→L3), no L4 leaf.
  if (cashUnits > 0 && totalMv > 0) {
    const cashShare = cashUnits / totalMv * 100;
    const palette = SUNBURST_PALETTE['现金'];
    const cashNode = function(colorIdx, labelColor, children) {
      const c = palette[colorIdx];
      const n = {
        name: '现金', value: cashUnits, units: cashUnits, share_pct: cashShare,
        itemStyle: { color: c, borderColor: darken(c, 0.10), borderWidth: 1 },
        label: { color: labelColor },
      };
      if (children) n.children = children;
      return n;
    };
    const l3 = cashNode(2, '#333');
    const l2 = cashNode(1, '#fff', [l3]);
    data.push(cashNode(0, '#fff', [l2]));
  }
  return data;
}

/* ── Allocation: 月度涨跌幅 (图5) ── */
function computeMonthlyReturns() {
  if (!_allocation || !_allocation.timeseries) return [];
  const ts = _allocation.timeseries;
  // Pick last sample of each calendar month
  const monthLast = {}; // "YYYY-MM" -> {date, nav}
  ts.forEach(function(r) {
    const ym = r.date.slice(0, 7);
    if (!monthLast[ym] || r.date > monthLast[ym].date) {
      monthLast[ym] = { date: r.date, nav: r.nav };
    }
  });
  const months = Object.keys(monthLast).sort();
  const result = []; // {ym, year, month, ret_pct}
  let prevNav = null;
  months.forEach(function(ym) {
    const cur = monthLast[ym].nav;
    if (prevNav !== null && prevNav > 0) {
      result.push({
        ym: ym,
        year: parseInt(ym.slice(0, 4), 10),
        month: parseInt(ym.slice(5, 7), 10),
        ret_pct: (cur / prevNav - 1) * 100,
      });
    } else {
      result.push({
        ym: ym, year: parseInt(ym.slice(0, 4), 10), month: parseInt(ym.slice(5, 7), 10), ret_pct: 0,
      });
    }
    prevNav = cur;
  });
  return result;
}

function renderAllocationMonthly() {
  const monthly = computeMonthlyReturns();
  if (!monthly.length) return '';
  // Group by year, descending
  const byYear = {};
  monthly.forEach(function(m) {
    (byYear[m.year] = byYear[m.year] || []).push(m);

  const years = Object.keys(byYear).map(Number).sort(function(a, b) { return b - a; });

  const yearsHtml = years.map(function(y) {

      + '<div id="acMr_' + y + '" class="ac-mr-chart"></div>'
      + '<div class="ac-mr-year-label">' + y + '</div>'
      + '</div>';
  }).join('');

  return '<div class="card">'
    + '<div class="card-title">长赢' + (_currentPlan === '150' ? '150' : 'S') + ' 月涨跌幅%</div>'
    + '<div style="font-size:11px;color:#aaa;text-align:center;margin-bottom:8px">'
    + (_allocation.updatedAt || '').slice(0, 10) + '</div>'
    + yearsHtml
    + '</div>';
}

function renderAnalysisTab() {
  const el = document.getElementById("tab-analysis");
  if (!_analysis) {

    return;
  }
  const s = _analysis.summary;
  const trades = _analysis.sell_trades || [];
  const positions = _analysis.positions || [];
  const monthly = _analysis.monthly_activity || [];

  /* ── KPI cards ── */
  function kpiCard(label, value, sub) {
    return '<div class="an-kpi"><div class="an-kpi-val">' + value + '</div>'
      + '<div class="an-kpi-label">' + label + '</div>'
      + (sub ? '<div class="an-kpi-sub">' + sub + '</div>' : '') + '</div>';
  }

  const kpiHtml = '<div class="card"><div class="card-title">策略概览</div>'
    + '<div class="an-kpi-row">'

    + kpiCard('平均收益', '+' + s.avg_return_pct + '%', '每笔卖出')
    + kpiCard('平均持仓', Math.round(s.avg_hold_days / 365 * 10) / 10 + ' 年', s.avg_hold_days + ' 天')
    + kpiCard('当前持仓', s.current_positions + ' 只', '未实现 ' + (s.unrealized_return_pct >= 0 ? '+' : '') + s.unrealized_return_pct + '%')
    + '</div></div>';

  /* ── Return distribution chart (bar) ── */
  const brackets = [
    { label: '<0%',    lo: -999, hi: 0   },
    { label: '0~20%',  lo: 0,    hi: 20  },
    { label: '20~40%', lo: 20,   hi: 40  },
    { label: '40~60%', lo: 40,   hi: 60  },
    { label: '60~80%', lo: 60,   hi: 80  },
    { label: '80%+',   lo: 80,   hi: 999 },
  ];
  const buckets = brackets.map(function(b) {
    return trades.filter(function(t) { return t.return_pct >= b.lo && t.return_pct < b.hi; }).length;
  });
  const maxBucket = Math.max(...buckets) || 1;
  const distBars = brackets.map(function(b, i) {
    const cnt = buckets[i];
    const pct = Math.round(cnt / maxBucket * 100);
    const color = b.lo < 0 ? '#ff4d4f' : '#52c41a';
    return '<div class="an-bar-row">'
      + '<div class="an-bar-label">' + b.label + '</div>'
      + '<div class="an-bar-track"><div class="an-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
      + '<div class="an-bar-cnt">' + cnt + '</div>'
      + '</div>';
  }).join('');

  const distHtml = '<div class="card"><div class="card-title">卖出收益分布</div>'
    + '<div class="an-dist">' + distBars + '</div></div>';

  /* ── Current positions table ── */
  const posRows = positions.filter(function(p) { return p.units > 0; }).map(function(p) {
    const ret = p.return_pct !== null ? p.return_pct : null;
    const retStr = ret !== null ? (ret >= 0 ? '+' : '') + ret.toFixed(1) + '%' : '-';
    const retColor = ret === null ? '' : ret >= 0 ? 'color:#52c41a' : 'color:#ff4d4f';
    const holdYears = p.hold_days ? (p.hold_days / 365).toFixed(1) + 'y' : '-';
    return '<tr>'
      + '<td>' + escHtml(p.fund.length > 20 ? p.fund.slice(0, 20) + '…' : p.fund) + '</td>'
      + '<td class="an-cat">' + escHtml(p.category) + '</td>'
      + '<td style="text-align:right">' + p.units + '</td>'
      + '<td style="text-align:right;' + retColor + '">' + retStr + '</td>'
      + '<td style="text-align:right">' + holdYears + '</td>'
      + '</tr>';
  }).join('');

  const posHtml = '<div class="card"><div class="card-title">当前持仓（' + positions.filter(function(p){return p.units>0;}).length + ' 只）</div>'
    + '<div class="an-table-wrap"><table class="an-table">'
    + '<thead><tr><th>基金</th><th>类别</th><th style="text-align:right">份数</th>'
    + '<th style="text-align:right">收益</th><th style="text-align:right">持仓年限</th></tr></thead>'
    + '<tbody>' + posRows + '</tbody></table></div></div>';

  /* ── Sell trades table (recent 20) ── */
  const recent = trades.slice().sort(function(a, b) { return b.sell_date.localeCompare(a.sell_date); }).slice(0, 30);
  const tradeRows = recent.map(function(t) {
    const ret = t.return_pct;
    const retColor = ret >= 0 ? 'color:#52c41a' : 'color:#ff4d4f';
    const holdYears = t.hold_days >= 0 ? (t.hold_days / 365).toFixed(1) + 'y' : '-';
    return '<tr>'
      + '<td>' + escHtml(t.sell_date) + '</td>'
      + '<td>' + escHtml(t.fund.length > 20 ? t.fund.slice(0, 20) + '…' : t.fund) + '</td>'
      + '<td class="an-cat">' + escHtml(t.category) + '</td>'
      + '<td style="text-align:right;' + retColor + '">' + (ret >= 0 ? '+' : '') + ret.toFixed(1) + '%</td>'
      + '<td style="text-align:right">' + holdYears + '</td>'
      + '</tr>';
  }).join('');

  const tradesHtml = '<div class="card"><div class="card-title">近期卖出记录（最新 30 笔）</div>'
    + '<div class="an-table-wrap"><table class="an-table">'
    + '<thead><tr><th>卖出日期</th><th>基金</th><th>类别</th>'
    + '<th style="text-align:right">收益</th><th style="text-align:right">持仓年限</th></tr></thead>'
    + '<tbody>' + tradeRows + '</tbody></table></div></div>';

  /* ── Monthly activity mini-chart ── */
  const recentMonths = monthly.slice(-36);
  const maxActivity = Math.max(...recentMonths.map(function(m) { return m.buy + m.sell; }), 1);
  const actBars = recentMonths.map(function(m) {
    const buyH = Math.round(m.buy / maxActivity * 40);
    const sellH = Math.round(m.sell / maxActivity * 40);
    const tooltip = m.month + ' 买' + m.buy + ' 卖' + m.sell;
    return '<div class="an-act-bar" title="' + tooltip + '">'
      + '<div class="an-act-sell" style="height:' + sellH + 'px"></div>'
      + '<div class="an-act-buy" style="height:' + buyH + 'px"></div>'
      + '</div>';
  }).join('');
  const actHtml = '<div class="card"><div class="card-title">交易活动（近 3 年，蓝=买 橙=卖）</div>'
    + '<div class="an-activity">' + actBars + '</div>'
    + '<div class="an-act-legend"><span class="an-leg-buy">买入</span><span class="an-leg-sell">卖出</span></div>'
    + '</div>';

  const compHtml     = renderAllocationComposition();
  const sunburstHtml = renderAllocationSunburst();
  const trendHtml    = renderAllocationTrend();
  const monthlyHtml  = renderAllocationMonthly();
  const navHtml      = renderNavChart();

  const summaryHtml = renderL1Summary();
  const subtabBar = '<div class="subtab-bar">'
    + '<button class="subtab-btn active" data-subtab="snapshot"   onclick="switchSubTab(\'snapshot\')">资产详情</button>'
    + '<button class="subtab-btn"        data-subtab="layered"    onclick="switchSubTab(\'layered\')">资产分布</button>'
    + '<button class="subtab-btn"        data-subtab="timeseries" onclick="switchSubTab(\'timeseries\')">组合净值</button>'
    + '<button class="subtab-btn"        data-subtab="strategy"   onclick="switchSubTab(\'strategy\')">策略数据</button>'
    + '</div>';

  el.innerHTML = '<div style="max-width:900px;margin:0 auto;padding:16px">'
    + '<div style="color:#999;font-size:12px;text-align:right;margin-bottom:8px">更新于 ' + (_analysis.updatedAt || '').slice(0, 10) + '</div>'
    + summaryHtml
    + subtabBar
    + '<div class="subtab-panel active" data-subtab="snapshot">' + compHtml + '</div>'
    + '<div class="subtab-panel"        data-subtab="layered">'  + sunburstHtml + '</div>'
    + '<div class="subtab-panel"        data-subtab="timeseries">' + navHtml + trendHtml + monthlyHtml + '</div>'
    + '<div class="subtab-panel"        data-subtab="strategy">' + kpiHtml + distHtml + actHtml + posHtml + tradesHtml + '</div>'
    + '</div>';

  // ECharts must init after DOM is in place
  initAllocationSunburst();
  initAllocationTrendChart();
  initAllocationMonthly();
  initNavChart();
}

function renderChart(nav, fundCode) {
  const container = document.getElementById("chartContainer");
  const info      = document.getElementById("navInfo");
  container.innerHTML = "";

  if (_chart) { _chart.dispose(); _chart = null; }
  _chart = echarts.init(container);

  const holding   = _appData.holdings.find(function(h) { return h.fundCode === fundCode; });
  const buyPoints  = [];
  const sellPoints = [];

  if (holding) {
    for (let i = 0; i < holding.history.length; i++) {
      const h = holding.history[i];
      const dateIdx = nav.dates.indexOf(h.date);
      if (dateIdx === -1) continue;
      const point = { coord: [h.date, nav.accNav[dateIdx]], value: h.unit };
      if (h.action === "buy") buyPoints.push(point);
      else sellPoints.push(point);
    }
  }

  const option = {
    tooltip: {
      trigger: "axis",
      formatter: function(params) {
        let tip = params[0].axisValue;
        for (let i = 0; i < params.length; i++) {
          const p = params[i];
          tip += "<br/>" + p.marker + p.seriesName + "：" + p.value[1];
        }
        return tip;
      },
    },
    legend: { data: ["单位净值", "累计净值"], top: 8 },
    grid: { left: 50, right: 30, top: 50, bottom: 80 },
    xAxis: {
      type: "category",
      data: nav.dates,
      axisLabel: { fontSize: 11 },
      boundaryGap: false,
    },
    yAxis: [{
      type: "value",
      scale: true,
      splitLine: { lineStyle: { type: "dashed", color: "#eee" } },
    }],
    dataZoom: [
      { type: "slider", start: 0, end: 100, bottom: 10, height: 24 },
      { type: "inside" },
    ],
    series: [
      {
        name: "单位净值",
        type: "line",
        symbol: "none",
        lineStyle: { width: 1.5, color: "#4a7dcc" },
        itemStyle: { color: "#4a7dcc" },
        data: nav.dates.map(function(d, i) { return [d, nav.unitNav[i]]; }),
      },
      {
        name: "累计净值",
        type: "line",
        symbol: "none",
        lineStyle: { width: 1.5, color: "#52c41a" },
        itemStyle: { color: "#52c41a" },
        data: nav.dates.map(function(d, i) { return [d, nav.accNav[i]]; }),
        markPoint: {
          symbol: "circle",
          symbolSize: 6,
          data: buyPoints.map(function(p) {
            return {
              coord: p.coord,
              itemStyle: { color: "#ff6b6b", borderColor: "#ff4d4f", borderWidth: 2 },
              label: { show: true, position: "top", formatter: "B", color: "#333", fontSize: 11, fontWeight: "bold" },
            };
          }).concat(sellPoints.map(function(p) {
            return {
              coord: p.coord,
              itemStyle: { color: "#52c41a", borderColor: "#389e0d", borderWidth: 2 },
              label: { show: true, position: "top", formatter: "S", color: "#333", fontSize: 11, fontWeight: "bold" },
            };
          })),
        },
      },
    ],
  };

  _chart.setOption(option);

  const cur = nav.current;
  if (cur) {
    info.innerHTML = "当前单位净值：<strong>" + (cur.unitNav || "-") + "</strong>"
      + "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;当前累计净值：<strong>" + (cur.accNav || "-") + "</strong>";
  }

  window.addEventListener("resize", function() { if (_chart) _chart.resize(); });
}

function closeModal() {
  document.getElementById("chartModal").classList.remove("active");
  if (_chart) { _chart.dispose(); _chart = null; }
}

document.getElementById("chartModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

init();
</script>
</body>
</html>
