<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>长赢计划追踪</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #333;
      background: #f5f5f5;
      padding: 16px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-bottom: 2px solid #f0f0f0;
    }
    .tab-btn {
      padding: 10px 24px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: #333; }
    .tab-btn.active { color: #1677ff; border-bottom-color: #1677ff; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 16px;
    }

    /* ── Info Grid ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px 0;
    }
    .info-item { font-size: 13px; color: #555; }
    .info-item span { color: #111; font-weight: 500; }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-box {
      text-align: center;
      padding: 12px;
      background: #fafafa;
      border-radius: 6px;
      border: 1px solid #f0f0f0;
    }
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-num.green { color: #52c41a; }
    .stat-num.red { color: #ff4d4f; }
    .stat-num.blue { color: #1677ff; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    /* ── Timeline ── */
    .timeline { list-style: none; }
    .timeline-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .timeline-item:last-child { border-bottom: none; }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid;
      flex-shrink: 0;
    }
    .dot.buy  { border-color: #52c41a; }
    .dot.sell { border-color: #ff4d4f; }

    .tl-date { color: #999; min-width: 80px; }

    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      min-width: 36px;
      text-align: center;
    }
    .badge.buy  { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .badge.sell { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; }

    .tl-fund { color: #555; flex: 1; min-width: 0; }
    .tl-fund-name { display: block; }
    .tl-article-title {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }
    .tl-unit { color: #111; font-weight: 600; min-width: 40px; text-align: right; }
    .tl-link { color: #1677ff; text-decoration: none; font-size: 12px; white-space: nowrap; }
    .tl-link:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .tl-article-title { max-width: calc(100vw - 200px); }
    }

    /* ── Holdings ── */
    .holding-item {
      border: 1px solid #f0f0f0;
      border-radius: 6px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .holding-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      background: #fafafa;
      transition: background 0.15s;
    }
    .holding-header:hover { background: #f0f0f0; }

    .holding-left { display: flex; align-items: center; gap: 10px; }
    .holding-arrow {
      font-size: 10px;
      color: #aaa;
      transition: transform 0.2s;
    }
    .holding-item.open .holding-arrow { transform: rotate(90deg); }
    .holding-code { font-size: 12px; color: #999; font-family: monospace; }
    .holding-name { font-size: 13px; color: #111; font-weight: 500; }

    .holding-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #555; }
    .holding-unit-label { color: #555; }
    .holding-unit { font-weight: 700; color: #1677ff; cursor: pointer; }
    .holding-unit:hover { text-decoration: underline; }
    .holding-latest { font-size: 12px; color: #aaa; }

    .holding-body {
      display: none;
      padding: 4px 16px 12px;
      border-top: 1px solid #f0f0f0;
      background: #fff;
    }
    .holding-item.open .holding-body { display: block; }

    /* ── Post Cards ── */
    .post-list { display: flex; flex-direction: column; gap: 10px; }
    .post-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }
    .post-header {
      padding: 14px 20px 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .post-header:hover { background: #fafafa; }
    .post-card.open .post-header { background: #fafafa; }
    .post-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .post-title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      line-height: 1.4;
      flex: 1;
    }
    .post-arrow {
      font-size: 10px;
      color: #bbb;
      margin-top: 4px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .post-card.open .post-arrow { transform: rotate(90deg); }
    .post-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #aaa;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .post-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
    }
    .post-tag.plan { background: #f0f7ff; color: #1677ff; border: 1px solid #d0e8ff; }
    .post-tag.audio { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
    .post-tag.sticky { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .post-tag.awesome { background: #fff0f6; color: #eb2f96; border: 1px solid #ffadd2; }
    .post-tag.author  { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }
    .post-summary {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-body {
      display: none;
      padding: 0 20px 16px;
      border-top: 1px solid #f5f5f5;
    }
    .post-card.open .post-body { display: block; }
    .post-content {
      font-size: 14px;
      line-height: 1.9;
      color: #333;
      padding-top: 16px;
    }
    .post-content p { margin-bottom: 6px; }
    .post-content img { max-width: 100%; border-radius: 4px; margin: 8px 0; }
    .post-content a { color: #1677ff; }
    .post-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #f5f5f5;
      font-size: 12px;
      color: #aaa;
    }
    .post-ext-link { color: #1677ff; text-decoration: none; }
    .post-ext-link:hover { text-decoration: underline; }

    .posts-empty {
      text-align: center;
      padding: 48px;
      color: #bbb;
      font-size: 14px;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 0 8px;
      font-size: 13px;
      color: #555;
    }
    .page-btn {
      padding: 6px 16px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: #1677ff; color: #1677ff; }
    .page-btn:disabled { color: #bbb; cursor: not-allowed; border-color: #f0f0f0; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      width: 90vw;
      max-width: 900px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #f0f0f0;
    }
    .modal-title { font-size: 16px; font-weight: 600; color: #1677ff; }
    .modal-close {
      width: 32px; height: 32px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 18px;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { background: #f5f5f5; color: #333; }

    .modal-body { padding: 0 24px 16px; flex: 1; overflow: auto; }

    .chart-container { width: 100%; height: 420px; }

    .nav-info {
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 12px 0;
      border-top: 1px solid #f0f0f0;
      margin-top: 8px;
      font-size: 14px;
      color: #555;
    }
    .nav-info strong { color: #111; font-weight: 600; }

    .chart-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 420px;
      color: #888;
      font-size: 14px;
    }

    /* ── Footer ── */
    .updated-at {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      padding: 8px 0;
    }

    /* ── Loading / Error ── */
    .loading, .error {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 14px;
    }
    .error { color: #ff4d4f; }

    /* ── Strategy tab ── */
    .st-philo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .st-philo { padding: 12px; background: linear-gradient(135deg, #f0f7ff 0%, #fafafa 100%); border-radius: 6px; border-left: 3px solid #1677ff; }
    .st-philo-title { font-weight: 600; font-size: 14px; color: #1677ff; margin-bottom: 4px; }
    .st-philo-desc { font-size: 12px; color: #555; line-height: 1.5; }
    .st-pred { padding: 12px; border: 1px solid #f0f0f0; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: box-shadow 0.15s; }
    .st-pred:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    .st-pred-row { display: flex; align-items: center; gap: 12px; }
    .st-pred-fund { flex: 1; min-width: 0; }
    .st-pred-name { font-weight: 600; font-size: 14px; color: #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .st-pred-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .st-cat { display: inline-block; padding: 1px 6px; background: #f5f5f5; border-radius: 3px; color: #666; font-size: 11px; }
    .st-pred-ret { font-weight: 700; font-size: 16px; min-width: 60px; text-align: right; }
    .st-pred-signal { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 4px; min-width: 32px; text-align: center; }
    .st-pred-rule { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding-left: 4px; }
    .st-pred-rulename { font-size: 12px; color: #555; flex: 1; }
    .st-conf { width: 80px; height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
    .st-conf-bar { height: 100%; transition: width 0.3s; }
    .st-conf-num { font-size: 11px; color: #888; min-width: 32px; text-align: right; }
    .st-pred-threshold { margin-top: 8px; padding: 6px 10px; background: #fffbe6; border-radius: 4px; font-size: 12px; color: #8c6900; border-left: 2px solid #ffd666; }
    .st-pred-detail { margin-top: 10px; padding: 10px; background: #fafafa; border-radius: 4px; font-size: 12px; }
    .st-pred-desc { color: #444; line-height: 1.6; }
    .st-pred-source { color: #888; margin-top: 6px; font-size: 11px; }
    .st-pred-allsig { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; color: #666; font-size: 11px; }
    .st-other-sig { padding: 2px 0; color: #888; }
    .st-rules-section { margin-bottom: 16px; }
    .st-rules-section h4 { margin: 0 0 8px 0; font-size: 14px; color: #444; }
    .st-rule { padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .st-rule:last-child { border-bottom: none; }
    .st-rule-name { font-weight: 600; font-size: 13px; color: #333; }
    .st-rule-desc { font-size: 12px; color: #666; margin: 4px 0; line-height: 1.5; }
    .st-rule-src { font-size: 11px; color: #999; }

    /* ── Analysis tab ── */
    .an-kpi-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .an-kpi { flex: 1; min-width: 120px; background: #fafafa; border: 1px solid #f0f0f0; border-radius: 8px; padding: 16px; text-align: center; }
    .an-kpi-val { font-size: 28px; font-weight: 700; color: #1677ff; }
    .an-kpi-label { font-size: 13px; color: #666; margin-top: 4px; }
    .an-kpi-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
    .an-dist { display: flex; flex-direction: column; gap: 8px; }
    .an-bar-row { display: flex; align-items: center; gap: 8px; }
    .an-bar-label { width: 56px; font-size: 12px; color: #666; text-align: right; flex-shrink: 0; }
    .an-bar-track { flex: 1; height: 20px; background: #f5f5f5; border-radius: 4px; overflow: hidden; }
    .an-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
    .an-bar-cnt { width: 28px; font-size: 12px; color: #666; flex-shrink: 0; }
    .an-table-wrap { overflow-x: auto; }
    .an-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .an-table th { background: #fafafa; padding: 8px 10px; border-bottom: 1px solid #f0f0f0; font-weight: 600; text-align: left; white-space: nowrap; }
    .an-table td { padding: 7px 10px; border-bottom: 1px solid #f7f7f7; }
    .an-table tr:last-child td { border-bottom: none; }
    .an-cat { color: #888; font-size: 12px; }
    .an-activity { display: flex; align-items: flex-end; gap: 3px; height: 56px; padding: 4px 0; overflow-x: auto; }
    .an-act-bar { display: flex; flex-direction: column; align-items: center; gap: 1px; flex-shrink: 0; }
    .an-act-buy  { width: 8px; background: #1677ff; border-radius: 2px 2px 0 0; min-height: 1px; }
    .an-act-sell { width: 8px; background: #ff7a00; border-radius: 2px 2px 0 0; min-height: 1px; }
    .an-act-legend { display: flex; gap: 16px; font-size: 12px; color: #888; margin-top: 8px; }
    .an-leg-buy::before  { content: ''; display: inline-block; width: 10px; height: 10px; background: #1677ff; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
    .an-leg-sell::before { content: ''; display: inline-block; width: 10px; height: 10px; background: #ff7a00; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

    /* ── Allocation: composition (图1) ── */
    .ac-bar { display: flex; height: 14px; border-radius: 7px; overflow: hidden; background: #f0f0f0; margin: 8px 0 4px; border: 1px dashed #d9d9d9; }
    .ac-seg { height: 100%; transition: width 0.3s; }
    .ac-legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 11px; color: #888; margin-bottom: 12px; }
    .ac-leg-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .ac-cls-block { margin-bottom: 14px; }
    .ac-cls-head { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #fafafa; border-radius: 4px; font-size: 13px; color: #333; }
    .ac-cls-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .ac-cls-name { font-weight: 600; }
    .ac-cls-meta { color: #666; font-size: 12px; }
    .ac-cls-ret { margin-left: auto; font-weight: 600; }
    .ac-fund-row { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
    .ac-fund-row:last-child { border-bottom: none; }
    .ac-fund-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ac-fund-name .ac-trade-date { color: #aaa; font-size: 11px; margin-left: 6px; }
    .ac-fund-cleared { color: #bbb; font-size: 11px; margin-left: 6px; padding: 1px 6px; background: #f5f5f5; border-radius: 3px; }
    .ac-fund-units { width: 60px; text-align: right; color: #666; }
    .ac-fund-share { width: 70px; text-align: right; color: #666; }
    .ac-fund-ret { width: 80px; text-align: right; font-weight: 600; }

    /* ── Allocation: trend chart (图2) ── */
    .ac-trend { width: 100%; height: 360px; }

    /* ── Allocation: sunburst (图3) ── */
    .ac-sunburst { width: 100%; height: 560px; }

    /* ── Allocation: return bar list (图4) ── */
    .ac-rb-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 12px; }
    .ac-rb-name { width: 200px; text-align: right; color: #444; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ac-rb-track { flex: 1; height: 16px; position: relative; }
    .ac-rb-axis { position: absolute; top: 0; bottom: 0; width: 1px; background: #d9d9d9; }
    .ac-rb-bar { position: absolute; height: 12px; top: 2px; border-radius: 2px; }
    .ac-rb-bar-pos { background: #ffd1d1; }
    .ac-rb-bar-neg { background: #b7eee0; }
    .ac-rb-val-pos { color: #ff4d4f; font-weight: 600; }
    .ac-rb-val-neg { color: #52c41a; font-weight: 600; }
    .ac-rb-val { position: absolute; top: 0; line-height: 16px; font-size: 11px; padding: 0 4px; }

    /* ── Allocation: monthly returns (图5) ── */
    .ac-mr-year { margin-bottom: 14px; padding: 8px 6px 4px; background: #fff; border-radius: 4px; position: relative; }
    .ac-mr-year-label { position: absolute; right: 8px; bottom: 6px; padding: 2px 8px; background: #eef3ff; color: #5b8def; font-size: 11px; border-radius: 2px; font-weight: 600; }
    .ac-mr-chart { width: 100%; height: 90px; }

    /* Plan selector */
    .plan-bar { display: flex; gap: 8px; padding: 10px 16px 0; max-width: 900px; margin: 0 auto; align-items: center; }
    .plan-bar-label { font-size: 12px; color: #888; }
    .plan-btn { padding: 4px 12px; font-size: 12px; border: 1px solid #d9d9d9; background: white; cursor: pointer; border-radius: 4px; color: #666; }
    .plan-btn.active { background: #1677ff; color: white; border-color: #1677ff; }

    @media (max-width: 600px) {
      body { padding: 8px; }
      .info-grid { grid-template-columns: 1fr 1fr; }
      .holding-right .holding-latest { display: none; }
      .modal { width: 96vw; }
      .chart-container { height: 320px; }
      .nav-info { gap: 24px; font-size: 13px; }
      .tab-btn { padding: 10px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="signals" onclick="switchTab('signals')">信号追踪</button>
  <button class="tab-btn" data-tab="posts" onclick="switchTab('posts')">E大文章</button>
  <button class="tab-btn" data-tab="strategy" onclick="switchTab('strategy')">策略预测</button>
  <button class="tab-btn" data-tab="analysis" onclick="switchTab('analysis')">策略分析</button>
</div>
<div class="plan-bar" id="planBar">
  <span class="plan-bar-label">计划:</span>
  <button class="plan-btn active" data-plan="150" onclick="switchPlan('150')">150份计划</button>
  <button class="plan-btn" data-plan="s" onclick="switchPlan('s')">S计划</button>
</div>

<div id="tab-signals"><div class="loading">加载中...</div></div>
<div id="tab-posts" style="display:none"><div class="loading">加载中...</div></div>
<div id="tab-strategy" style="display:none"><div class="loading">加载中...</div></div>
<div id="tab-analysis" style="display:none"><div class="loading">加载中...</div></div>

<div class="modal-overlay" id="chartModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="chart-container" id="chartContainer">
        <div class="chart-loading">加载净值数据...</div>
      </div>
      <div class="nav-info" id="navInfo"></div>
    </div>
  </div>
</div>

<script>
const CONTENT_URL      = "./content.json";
const POSTS_INDEX_URL  = "./posts-index.json";
const POSTS_CONTENT    = "./posts/";
const NAV_BASE         = "./nav/";

const PLAN_FILES = {
  "150": { data: "./data.json",   analysis: "./analysis.json",   strategy: "./strategy.json"   },
  "s":   { data: "./data_s.json", analysis: "./analysis_s.json", strategy: "./strategy_s.json" },
};

const PAGE_SIZE = 50;

let _contentMap   = {};
let _postsIndex   = [];   // full index array
let _contentCache = {};   // id → content object (lazy loaded)
let _postsPage    = 0;
let _chart        = null;

// Plan-scoped data (loaded per plan, cached)
let _currentPlan  = "150";
let _planCache    = {}; // { "150": { data, analysis, strategy }, "s": {...} }
// Aliases pointing to current plan's data:
let _appData      = null;
let _analysis     = null;
let _strategy     = null;
let _allocation   = null;
let _allocationAll = null; // shared (loaded once, contains both plans)
let _trendChart   = null;

function extractItemId(url) {
  if (!url) return null;
  const m = url.match(/\/items\/(\d+)/);
  return m ? m[1] : null;
}

function fmt(d) { return d ? d.slice(0, 10) : "-"; }

function escHtml(s) {
  const el = document.createElement("span");
  el.textContent = String(s || "");
  return el.innerHTML;
}

/* ── Tab switching ── */
function switchTab(name) {
  document.querySelectorAll(".tab-btn").forEach(function(b) {
    b.classList.toggle("active", b.getAttribute("data-tab") === name);
  });
  document.getElementById("tab-signals").style.display  = name === "signals"  ? "block" : "none";
  document.getElementById("tab-posts").style.display    = name === "posts"    ? "block" : "none";
  document.getElementById("tab-strategy").style.display = name === "strategy" ? "block" : "none";
  document.getElementById("tab-analysis").style.display = name === "analysis" ? "block" : "none";
  // Plan bar only relevant when viewing plan-scoped tabs
  document.getElementById("planBar").style.display = name === "posts" ? "none" : "flex";

  // Charts inside hidden tabs are initialized at 0 width — resize on show
  if (name === "analysis") resizeAnalysisCharts();
}

function resizeAnalysisCharts() {
  // requestAnimationFrame ensures the layout has been computed after display change
  requestAnimationFrame(function() {
    ['acSunburst', 'acTrendChart'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el && el._chart) el._chart.resize();
    });
    document.querySelectorAll('[id^="acMr_"]').forEach(function(el) {
      if (el._chart) el._chart.resize();
    });
  });
}

/* ── Plan switching ── */
async function loadPlan(plan) {
  if (_planCache[plan]) return _planCache[plan];
  const files = PLAN_FILES[plan];
  if (!files) throw new Error("Unknown plan: " + plan);

  const [dataRes, anaRes, stratRes] = await Promise.all([
    fetch(files.data),
    fetch(files.analysis).catch(function() { return null; }),
    fetch(files.strategy).catch(function() { return null; }),
  ]);
  if (!dataRes.ok) throw new Error("HTTP " + dataRes.status + " for " + files.data);

  const cached = { data: await dataRes.json(), analysis: null, strategy: null };
  if (anaRes && anaRes.ok)     cached.analysis = await anaRes.json();
  if (stratRes && stratRes.ok) cached.strategy = await stratRes.json();
  _planCache[plan] = cached;
  return cached;
}

async function loadAllocation() {
  if (_allocationAll) return _allocationAll;
  try {
    const r = await fetch("./allocation.json");
    if (!r.ok) return null;
    _allocationAll = await r.json();
    return _allocationAll;
  } catch (e) {
    return null;
  }
}

async function switchPlan(plan) {
  if (plan === _currentPlan && _appData) return;
  document.querySelectorAll(".plan-btn").forEach(function(b) {
    b.classList.toggle("active", b.getAttribute("data-plan") === plan);
  });

  // Show loading state
  document.getElementById("tab-signals").innerHTML  = '<div class="loading">切换到 ' + plan + ' 计划...</div>';
  document.getElementById("tab-strategy").innerHTML = '<div class="loading">切换中...</div>';
  document.getElementById("tab-analysis").innerHTML = '<div class="loading">切换中...</div>';

  try {
    const c = await loadPlan(plan);
    _currentPlan = plan;
    _appData  = c.data;
    _analysis = c.analysis;
    _strategy = c.strategy;
    _allocation = _allocationAll && _allocationAll.plans && _allocationAll.plans[plan] || null;
    renderAllForCurrentPlan();
  } catch (e) {
    document.getElementById("tab-signals").innerHTML = '<div class="error">' + plan + ' 计划加载失败：' + e.message + '</div>';
  }
}

function renderAllForCurrentPlan() {
  const sigTab = document.getElementById("tab-signals");
  sigTab.innerHTML = renderSignals(_appData);
  sigTab.querySelectorAll(".tl-article-title[data-title]").forEach(function(el) {
    el.textContent = el.getAttribute("data-title");
  });
  const first = sigTab.querySelector(".holding-item");
  if (first) first.classList.add("open");

  renderStrategyTab();
  renderAnalysisTab();
}

/* ── Init ── */
async function init() {
  try {
    // Posts/content are global (not plan-scoped)
    const [contentRes, indexRes] = await Promise.all([
      fetch(CONTENT_URL).catch(function() { return null; }),
      fetch(POSTS_INDEX_URL).catch(function() { return null; }),
    ]);
    if (contentRes && contentRes.ok) _contentMap = await contentRes.json();
    if (indexRes && indexRes.ok)     _postsIndex = await indexRes.json();

    // Load default plan (150) and allocation in parallel
    const [c, alloc] = await Promise.all([loadPlan(_currentPlan), loadAllocation()]);
    _appData  = c.data;
    _analysis = c.analysis;
    _strategy = c.strategy;
    _allocation = alloc && alloc.plans && alloc.plans[_currentPlan] || null;

    renderAllForCurrentPlan();
    renderPostsTab();

  } catch (e) {
    document.getElementById("tab-signals").innerHTML = '<div class="error">数据加载失败：' + e.message + "</div>";
  }
}

/* ── Signals tab ── */
function renderSignals(d) {
  const infoHtml = '<div class="card">'
    + '<div class="card-title">投顾计划信息</div>'
    + '<div class="info-grid">'
    + '<div class="info-item">投顾名称：<span>' + escHtml(d.poName) + '</span></div>'
    + '<div class="info-item">总份数：<span>' + d.totalUnit + ' 份</span></div>'
    + '<div class="info-item">提供方：<span>且慢</span></div>'
    + '<div class="info-item">描述：<span>主理人：ETF拯救世界</span></div>'
    + '</div></div>';

  let signalRows = "";
  for (let i = 0; i < d.recentSignals.length; i++) {
    const s = d.recentSignals[i];
    const itemId = extractItemId(s.articleLink);
    const articleTitle = itemId && _contentMap[itemId] ? _contentMap[itemId].title : "";
    const titleSpan = articleTitle
      ? '<span class="tl-article-title" data-title="' + escHtml(articleTitle) + '"></span>'
      : "";
    const linkHtml = s.articleLink
      ? '<a class="tl-link" href="' + escHtml(s.articleLink) + '" target="_blank" rel="noopener">&#x1F517; 发车文章</a>'
      : "";
    signalRows += '<li class="timeline-item">'
      + '<span class="dot ' + s.action + '"></span>'
      + '<span class="tl-date">' + fmt(s.date) + '</span>'
      + '<span class="badge ' + s.action + '">' + (s.action === "buy" ? "买入" : "卖出") + '</span>'
      + '<span class="tl-fund"><span class="tl-fund-name">' + escHtml(s.fundCode) + '&nbsp;&nbsp;' + escHtml(s.fundName) + '</span>' + titleSpan + '</span>'
      + '<span class="tl-unit">' + s.unit + ' 份</span>'
      + linkHtml
      + '</li>';
  }
  const signalsHtml = '<div class="card">'
    + '<div class="card-title">最近发车</div>'
    + '<ul class="timeline">' + signalRows + '</ul></div>';

  const statsHtml = '<div class="card">'
    + '<div class="card-title">数据统计</div>'
    + '<div class="stats-grid">'
    + '<div class="stat-box"><div class="stat-num green">' + d.totalBuy + '</div><div class="stat-label">历史买入份数</div></div>'
    + '<div class="stat-box"><div class="stat-num red">' + d.totalSell + '</div><div class="stat-label">历史卖出份数</div></div>'
    + '<div class="stat-box"><div class="stat-num blue">' + d.investedUnit + '</div><div class="stat-label">当前持仓份数</div></div>'
    + '</div></div>';

  let holdingsRows = "";
  for (let i = 0; i < d.holdings.length; i++) {
    const h = d.holdings[i];
    let historyHtml = "";
    for (let j = 0; j < h.history.length; j++) {
      const r = h.history[j];
      const itemId = extractItemId(r.articleLink);
      const articleTitle = itemId && _contentMap[itemId] ? _contentMap[itemId].title : "";
      const titleSpan = articleTitle
        ? '<span class="tl-article-title" data-title="' + escHtml(articleTitle) + '"></span>'
        : "";
      const rLink = r.articleLink
        ? '<a class="tl-link" href="' + escHtml(r.articleLink) + '" target="_blank" rel="noopener">&#x1F517; 发车文章</a>'
        : "";
      historyHtml += '<li class="timeline-item">'
        + '<span class="dot ' + r.action + '"></span>'
        + '<span class="tl-date">' + fmt(r.date) + '</span>'
        + '<span class="badge ' + r.action + '">' + (r.action === "buy" ? "买入" : "卖出") + '</span>'
        + '<span class="tl-fund">' + titleSpan + '</span>'
        + '<span class="tl-unit">' + r.unit + ' 份</span>'
        + rLink
        + '</li>';
    }
    holdingsRows += '<div class="holding-item" id="h' + i + '">'
      + '<div class="holding-header" onclick="toggleHolding(\'h' + i + '\')">'
      + '<div class="holding-left">'
      + '<span class="holding-arrow">&#x25B6;</span>'
      + '<span class="holding-code">' + escHtml(h.fundCode) + '</span>'
      + '<span class="holding-name">' + escHtml(h.fundName) + '</span>'
      + '</div>'
      + '<div class="holding-right">'
      + '<span class="holding-unit-label">持仓：<span class="holding-unit" onclick="event.stopPropagation();openChart(\'' + escHtml(h.fundCode) + '\',\'' + escHtml(h.fundName) + '\')">' + h.currentUnit + ' 份</span></span>'
      + '<span class="holding-latest">最近发车: ' + (h.latestDate || "-") + '</span>'
      + '</div>'
      + '</div>'
      + '<div class="holding-body"><ul class="timeline">' + historyHtml + '</ul></div>'
      + '</div>';
  }
  const holdingsHtml = '<div class="card">'
    + '<div class="card-title">投顾持仓</div>'
    + holdingsRows + '</div>';

  const footer = '<div class="updated-at">数据更新时间：' + escHtml(d.updatedAt) + '</div>';

  return infoHtml + signalsHtml + statsHtml + holdingsHtml + footer;
}

/* ── Posts tab ── */
function renderPostsTab() {
  if (!_postsIndex.length) {
    document.getElementById("tab-posts").innerHTML = '<div class="posts-empty">暂无文章数据</div>';
    return;
  }
  document.getElementById("tab-posts").innerHTML = buildPostsHtml();
}

function buildPostsHtml() {
  const total = _postsIndex.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = _postsPage * PAGE_SIZE;
  const page  = _postsIndex.slice(start, start + PAGE_SIZE);

  const header = '<div class="card" style="margin-bottom:12px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">'
    + '<span style="font-size:13px;color:#555;">共 <strong>' + total + '</strong> 篇 · 点击标题展开全文</span>'
    + '<span style="font-size:12px;color:#aaa;">且慢 · 微博</span>'
    + '</div>';

  let listHtml = '<div class="post-list">';
  for (let i = 0; i < page.length; i++) {
    const p = page[i];
    const pid = "post-" + escHtml(String(p.id));
    const srcLabel = p.source === "weibo" ? "微博" : "且慢";

    let tags = "";
    if (p.author)    tags += '<span class="post-tag author">' + escHtml(p.author) + '</span>';
    if (p.isRetweet) tags += '<span class="post-tag" style="background:#fafafa;color:#aaa;border:1px solid #e8e8e8;">转发</span>';
    if (p.isSticky)  tags += '<span class="post-tag sticky">置顶</span>';
    if (p.isAwesome) tags += '<span class="post-tag awesome">精华</span>';
    if (p.poCode && p.poCode.length) tags += '<span class="post-tag plan">长赢</span>';
    if (p.hasAudio)  tags += '<span class="post-tag audio">🎵</span>';

    const meta = '<span>' + escHtml(p.date || "-") + '</span>'
      + '<span>' + srcLabel + '</span>'
      + (p.likeNum    ? '<span>👍 ' + p.likeNum    + '</span>' : '')
      + (p.commentNum ? '<span>💬 ' + p.commentNum + '</span>' : '')
      + tags;

    const summary = p.summary
      ? '<div class="post-summary">' + escHtml(p.summary) + '</div>'
      : "";

    listHtml += '<div class="post-card" id="' + pid + '">'
      + '<div class="post-header" onclick="togglePost(\'' + pid + '\',\'' + escHtml(String(p.id)) + '\')">'
      + '<div class="post-title-row">'
      + '<div class="post-title">' + escHtml(p.title || "（无标题）") + '</div>'
      + '<span class="post-arrow">&#x25B6;</span>'
      + '</div>'
      + '<div class="post-meta">' + meta + '</div>'
      + summary
      + '</div>'
      + '<div class="post-body" data-loaded="false"></div>'
      + '</div>';
  }
  listHtml += '</div>';

  const pagination = '<div class="pagination">'
    + '<button class="page-btn" onclick="gotoPage(' + (_postsPage - 1) + ')"'
    + (_postsPage === 0 ? ' disabled' : '') + '>上一页</button>'
    + '<span>第 ' + (_postsPage + 1) + ' / ' + totalPages + ' 页</span>'
    + '<button class="page-btn" onclick="gotoPage(' + (_postsPage + 1) + ')"'
    + (_postsPage >= totalPages - 1 ? ' disabled' : '') + '>下一页</button>'
    + '</div>';

  return header + listHtml + pagination;
}

function gotoPage(page) {
  _postsPage = page;
  document.getElementById("tab-posts").innerHTML = buildPostsHtml();
  document.getElementById("tab-posts").scrollIntoView({ behavior: "smooth", block: "start" });
}

async function togglePost(pid, postId) {
  const card = document.getElementById(pid);
  const wasOpen = card.classList.contains("open");
  card.classList.toggle("open");

  if (!wasOpen) {
    const body = card.querySelector(".post-body");
    if (body.getAttribute("data-loaded") === "false") {
      body.innerHTML = '<div style="padding:16px;color:#aaa;font-size:13px;">加载中...</div>';
      try {
        let content = _contentCache[postId];
        if (!content) {
          const res = await fetch(POSTS_CONTENT + postId + ".json");
          if (!res.ok) throw new Error("HTTP " + res.status);
          content = await res.json();
          _contentCache[postId] = content;
        }
        const clean = DOMPurify.sanitize(content.richContent || "<p>（正文暂无内容）</p>");
        const srcLink = '<a class="post-ext-link" href="' + escHtml(content.url || "") + '" target="_blank" rel="noopener">查看原文 ↗</a>';
        const audioLink = content.audioUrl
          ? '<a class="post-ext-link" href="' + escHtml(content.audioUrl) + '" target="_blank" rel="noopener">🎵 音频版</a>'
          : "";
        let retweetHtml = "";
        if (content.retweetContent) {
          const rtClean = DOMPurify.sanitize(content.retweetContent);
          retweetHtml = '<div style="margin-top:12px;padding:12px 16px;background:#fafafa;border-left:3px solid #d9d9d9;border-radius:0 4px 4px 0;">'
            + '<div style="font-size:12px;color:#aaa;margin-bottom:6px;">转发自 @' + escHtml(content.retweetAuthor || "") + '</div>'
            + '<div class="post-content" style="font-size:13px;">' + rtClean + '</div>'
            + '</div>';
        }
        body.innerHTML = '<div class="post-content">' + clean + '</div>'
          + retweetHtml
          + '<div class="post-footer">' + srcLink
          + '<div style="display:flex;gap:12px;">' + audioLink + '</div></div>';
        body.setAttribute("data-loaded", "true");
      } catch(e) {
        body.innerHTML = '<div style="padding:16px;color:#ff4d4f;font-size:13px;">加载失败：' + e.message + '</div>';
      }
    }
  }
}

/* ── Holdings ── */
function toggleHolding(id) {
  document.getElementById(id).classList.toggle("open");
}

/* ── NAV Chart ── */
async function openChart(fundCode, fundName) {
  const modal     = document.getElementById("chartModal");
  const title     = document.getElementById("modalTitle");
  const container = document.getElementById("chartContainer");
  const info      = document.getElementById("navInfo");

  title.textContent = fundName + "（" + fundCode + ".OF）净值走势及买卖点";
  info.innerHTML = "";
  container.innerHTML = '<div class="chart-loading">加载净值数据...</div>';
  modal.classList.add("active");

  try {
    const res = await fetch(NAV_BASE + fundCode + ".json");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const nav = await res.json();
    renderChart(nav, fundCode);
  } catch (e) {
    container.innerHTML = '<div class="chart-loading" style="color:#ff4d4f">净值数据加载失败：' + e.message + "</div>";
  }
}

/* ── Strategy tab ── */
const SIGNAL_LABELS = {
  sell: { label: "卖出", color: "#ff4d4f", bg: "#fff1f0" },
  buy:  { label: "买入", color: "#52c41a", bg: "#f6ffed" },
  hold: { label: "持有", color: "#8c8c8c", bg: "#fafafa" },
};

const CATEGORY_LABELS = {
  broad_index: "宽基指数",
  dividend:    "红利",
  sector:      "行业",
  bond:        "债券固收",
  overseas:    "海外",
  convertible: "可转债",
  unknown:     "其他",
};

function renderStrategyTab() {
  const el = document.getElementById("tab-strategy");
  if (!_strategy) {
    el.innerHTML = '<div class="error">策略数据未找到</div>';
    return;
  }
  const fw = _strategy.framework;
  const preds = _strategy.predictions || [];

  /* Philosophy cards */
  const philoHtml = '<div class="card"><div class="card-title">投资哲学（提取自 350+ 篇历史文章）</div>'
    + '<div class="st-philo-grid">'
    + fw.philosophy.map(function(p) {
        return '<div class="st-philo">'
          + '<div class="st-philo-title">' + escHtml(p.title) + '</div>'
          + '<div class="st-philo-desc">' + escHtml(p.desc) + '</div>'
          + '</div>';
      }).join('')
    + '</div></div>';

  /* Predictions grouped by action */
  const sells = preds.filter(function(p) { return p.primary_signal.action === "sell"; });
  const buys  = preds.filter(function(p) { return p.primary_signal.action === "buy"; });
  const holds = preds.filter(function(p) { return p.primary_signal.action === "hold"; });

  function predRow(p) {
    const sig = p.primary_signal;
    const meta = SIGNAL_LABELS[sig.action] || SIGNAL_LABELS.hold;
    const conf = sig.confidence || 0;
    const confBar = '<div class="st-conf"><div class="st-conf-bar" style="width:'
      + Math.round(conf * 100) + '%;background:' + meta.color + '"></div></div>';
    const ret = p.return_pct;
    const retColor = ret >= 0 ? '#52c41a' : '#ff4d4f';
    const cat = CATEGORY_LABELS[p.category] || p.category;
    const nt = p.next_threshold || {};

    return '<div class="st-pred" onclick="togglePredDetail(\'' + p.code + '\')">'
      + '<div class="st-pred-row">'
        + '<div class="st-pred-fund">'
          + '<div class="st-pred-name">' + escHtml(p.fund) + '</div>'
          + '<div class="st-pred-meta">'
            + '<span class="st-cat">' + escHtml(cat) + '</span>'
            + ' · ' + p.units + ' 份'
            + ' · 持有 ' + (p.hold_days ? Math.round(p.hold_days/365*10)/10 + ' 年' : '-')
          + '</div>'
        + '</div>'
        + '<div class="st-pred-ret" style="color:' + retColor + '">'
          + (ret >= 0 ? '+' : '') + ret.toFixed(1) + '%'
        + '</div>'
        + '<div class="st-pred-signal" style="background:' + meta.bg + ';color:' + meta.color + '">'
          + meta.label
        + '</div>'
      + '</div>'
      + '<div class="st-pred-rule">'
        + '<div class="st-pred-rulename">' + escHtml(sig.rule_name) + '</div>'
        + confBar
        + '<div class="st-conf-num">' + Math.round(conf * 100) + '%</div>'
      + '</div>'
      + (nt.description
          ? '<div class="st-pred-threshold">📍 ' + escHtml(nt.description) + '</div>'
          : '')
      + '<div id="pred-' + p.code + '" class="st-pred-detail" style="display:none">'
        + '<div class="st-pred-desc">' + escHtml(sig.description) + '</div>'
        + (sig.source ? '<div class="st-pred-source">📖 依据：' + escHtml(sig.source) + '</div>' : '')
        + (p.all_signals && p.all_signals.length > 1
            ? '<div class="st-pred-allsig"><b>其他匹配规则：</b>'
              + p.all_signals.slice(1).map(function(s) {
                  return '<div class="st-other-sig">' + escHtml(s.rule_name)
                       + ' (' + Math.round((s.confidence||0)*100) + '%)</div>';
                }).join('')
              + '</div>'
            : '')
      + '</div>'
    + '</div>';
  }

  function group(title, items, color) {
    if (items.length === 0) return '';
    return '<div class="card">'
      + '<div class="card-title" style="color:' + color + '">' + title + '（' + items.length + '）</div>'
      + items.map(predRow).join('')
      + '</div>';
  }

  const predHtml =
      group('🔴 卖出信号', sells, '#ff4d4f')
    + group('🟢 买入信号', buys, '#52c41a')
    + group('⚪ 继续持有', holds, '#8c8c8c');

  /* Rule book */
  const ruleHtml = '<div class="card"><div class="card-title">完整规则库</div>'
    + '<div class="st-rules-section"><h4>卖出规则</h4>'
    + fw.sell_rules.map(function(r) {
        return '<div class="st-rule">'
          + '<div class="st-rule-name">[' + r.id + '] ' + escHtml(r.name) + '</div>'
          + '<div class="st-rule-desc">' + escHtml(r.description) + '</div>'

function flattenAllocationFunds() {
  if (!_allocation || !_allocation.current) return [];
  const out = [];
  (_allocation.current.by_category || []).forEach(function(c) {
    if (c.class === 'cash') return;
    (c.funds || []).forEach(function(f) {
      if (f.return_pct === null || f.return_pct === undefined) return;
      out.push({
        name: f.name,
        short: shortFundName(f.name),
        cleared: f.status === 'cleared',
        return_pct: f.return_pct,
        units: f.units,
      });
    });
  });
  out.sort(function(a, b) { return b.return_pct - a.return_pct; });
  return out;
}

function shortFundName(name) {
  // Strip common 后缀
  return name
    .replace(/(联接|发起式|指数|增强|混合|债券|纯利|股票|主题|灵活配置)/g, '')
    .replace(/\([^)]*\)/g, '')
    .replace(/[A-Z]+$/, '')
    .replace(/\s+/g, ' ').trim();
}

function renderAllocationReturnBar() {

/* ── Allocation: 月度涨跌幅 (图5) ── */
function computeMonthlyReturns() {
  if (!_allocation || !_allocation.timeseries) return [];
  const ts = _allocation.timeseries;
  // Pick last sample of each calendar month
  const monthLast = {}; // "YYYY-MM" -> {date, nav}
  ts.forEach(function(r) {
    const ym = r.date.slice(0, 7);
    if (!monthLast[ym] || r.date > monthLast[ym].date) {
      monthLast[ym] = { date: r.date, nav: r.nav };
    }
  });
  const months = Object.keys(monthLast).sort();
  const result = []; // {ym, year, month, ret_pct}
  let prevNav = null;
  months.forEach(function(ym) {
    const cur = monthLast[ym].nav;
    if (prevNav !== null && prevNav > 0) {
      result.push({
        ym: ym,
        year: parseInt(ym.slice(0, 4), 10),
        month: parseInt(ym.slice(5, 7), 10),
        ret_pct: (cur / prevNav - 1) * 100,
      });
    } else {
      result.push({
        ym: ym, year: parseInt(ym.slice(0, 4), 10), month: parseInt(ym.slice(5, 7), 10), ret_pct: 0,
      });
    }
    prevNav = cur;
  });
  return result;
}

  const monthly = computeMonthlyReturns();

  // Group by year, descending
  const byYear = {};
  monthly.forEach(function(m) {

}

  ];
  const buckets = brackets.map(function(b) {
    return trades.filter(function(t) { return t.return_pct >= b.lo && t.return_pct < b.hi; }).length;
  });
  const maxBucket = Math.max(...buckets) || 1;
  const distBars = brackets.map(function(b, i) {
    const cnt = buckets[i];
    const pct = Math.round(cnt / maxBucket * 100);
    const color = b.lo < 0 ? '#ff4d4f' : '#52c41a';
    return '<div class="an-bar-row">'
      + '<div class="an-bar-label">' + b.label + '</div>'
      + '<div class="an-bar-track"><div class="an-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
      + '<div class="an-bar-cnt">' + cnt + '</div>'
      + '</div>';
  }).join('');

  const distHtml = '<div class="card"><div class="card-title">卖出收益分布</div>'
    + '<div class="an-dist">' + distBars + '</div></div>';

  /* ── Current positions table ── */
  const posRows = positions.filter(function(p) { return p.units > 0; }).map(function(p) {
    const ret = p.return_pct !== null ? p.return_pct : null;
    const retStr = ret !== null ? (ret >= 0 ? '+' : '') + ret.toFixed(1) + '%' : '-';
    const retColor = ret === null ? '' : ret >= 0 ? 'color:#52c41a' : 'color:#ff4d4f';
    const holdYears = p.hold_days ? (p.hold_days / 365).toFixed(1) + 'y' : '-';
    return '<tr>'
      + '<td>' + escHtml(p.fund.length > 20 ? p.fund.slice(0, 20) + '…' : p.fund) + '</td>'
      + '<td class="an-cat">' + escHtml(p.category) + '</td>'
      + '<td style="text-align:right">' + p.units + '</td>'
      + '<td style="text-align:right;' + retColor + '">' + retStr + '</td>'
      + '<td style="text-align:right">' + holdYears + '</td>'
      + '</tr>';
  }).join('');

  const posHtml = '<div class="card"><div class="card-title">当前持仓（' + positions.filter(function(p){return p.units>0;}).length + ' 只）</div>'
    + '<div class="an-table-wrap"><table class="an-table">'
    + '<thead><tr><th>基金</th><th>类别</th><th style="text-align:right">份数</th>'
    + '<th style="text-align:right">收益</th><th style="text-align:right">持仓年限</th></tr></thead>'
    + '<tbody>' + posRows + '</tbody></table></div></div>';

  /* ── Sell trades table (recent 20) ── */
  const recent = trades.slice().sort(function(a, b) { return b.sell_date.localeCompare(a.sell_date); }).slice(0, 30);
  const tradeRows = recent.map(function(t) {
    const ret = t.return_pct;
    const retColor = ret >= 0 ? 'color:#52c41a' : 'color:#ff4d4f';
    const holdYears = t.hold_days >= 0 ? (t.hold_days / 365).toFixed(1) + 'y' : '-';
    return '<tr>'
      + '<td>' + escHtml(t.sell_date) + '</td>'
      + '<td>' + escHtml(t.fund.length > 20 ? t.fund.slice(0, 20) + '…' : t.fund) + '</td>'
      + '<td class="an-cat">' + escHtml(t.category) + '</td>'
      + '<td style="text-align:right;' + retColor + '">' + (ret >= 0 ? '+' : '') + ret.toFixed(1) + '%</td>'
      + '<td style="text-align:right">' + holdYears + '</td>'
      + '</tr>';
  }).join('');

  const tradesHtml = '<div class="card"><div class="card-title">近期卖出记录（最新 30 笔）</div>'
    + '<div class="an-table-wrap"><table class="an-table">'
    + '<thead><tr><th>卖出日期</th><th>基金</th><th>类别</th>'
    + '<th style="text-align:right">收益</th><th style="text-align:right">持仓年限</th></tr></thead>'
    + '<tbody>' + tradeRows + '</tbody></table></div></div>';

  /* ── Monthly activity mini-chart ── */
  const recentMonths = monthly.slice(-36);
  const maxActivity = Math.max(...recentMonths.map(function(m) { return m.buy + m.sell; }), 1);
  const actBars = recentMonths.map(function(m) {
    const buyH = Math.round(m.buy / maxActivity * 40);
    const sellH = Math.round(m.sell / maxActivity * 40);
    const tooltip = m.month + ' 买' + m.buy + ' 卖' + m.sell;
    return '<div class="an-act-bar" title="' + tooltip + '">'
      + '<div class="an-act-sell" style="height:' + sellH + 'px"></div>'
      + '<div class="an-act-buy" style="height:' + buyH + 'px"></div>'
      + '</div>';
  }).join('');
  const actHtml = '<div class="card"><div class="card-title">交易活动（近 3 年，蓝=买 橙=卖）</div>'
    + '<div class="an-activity">' + actBars + '</div>'
    + '<div class="an-act-legend"><span class="an-leg-buy">买入</span><span class="an-leg-sell">卖出</span></div>'
    + '</div>';

  const compHtml     = renderAllocationComposition();
  const sunburstHtml = renderAllocationSunburst();
  const trendHtml    = renderAllocationTrend();
  const retBarHtml   = renderAllocationReturnBar();
  const monthlyHtml  = renderAllocationMonthly();

  el.innerHTML = '<div style="max-width:900px;margin:0 auto;padding:16px">'
    + '<div style="color:#999;font-size:12px;text-align:right;margin-bottom:8px">更新于 ' + (_analysis.updatedAt || '').slice(0, 10) + '</div>'
    + compHtml + sunburstHtml + trendHtml + retBarHtml + monthlyHtml
    + kpiHtml + distHtml + actHtml + posHtml + tradesHtml
    + '</div>';

  // ECharts must init after DOM is in place
  initAllocationSunburst();
  initAllocationTrendChart();
  initAllocationMonthly();
}

function renderChart(nav, fundCode) {
  const container = document.getElementById("chartContainer");
  const info      = document.getElementById("navInfo");
  container.innerHTML = "";

  if (_chart) { _chart.dispose(); _chart = null; }
  _chart = echarts.init(container);

  const holding   = _appData.holdings.find(function(h) { return h.fundCode === fundCode; });
  const buyPoints  = [];
  const sellPoints = [];

  if (holding) {
    for (let i = 0; i < holding.history.length; i++) {
      const h = holding.history[i];
      const dateIdx = nav.dates.indexOf(h.date);
      if (dateIdx === -1) continue;
      const point = { coord: [h.date, nav.accNav[dateIdx]], value: h.unit };
      if (h.action === "buy") buyPoints.push(point);
      else sellPoints.push(point);
    }
  }

  const option = {
    tooltip: {
      trigger: "axis",
      formatter: function(params) {
        let tip = params[0].axisValue;
        for (let i = 0; i < params.length; i++) {
          const p = params[i];
          tip += "<br/>" + p.marker + p.seriesName + "：" + p.value[1];
        }
        return tip;
      },
    },
    legend: { data: ["单位净值", "累计净值"], top: 8 },
    grid: { left: 50, right: 30, top: 50, bottom: 80 },
    xAxis: {
      type: "category",
      data: nav.dates,
      axisLabel: { fontSize: 11 },
      boundaryGap: false,
    },
    yAxis: [{
      type: "value",
      scale: true,
      splitLine: { lineStyle: { type: "dashed", color: "#eee" } },
    }],
    dataZoom: [
      { type: "slider", start: 0, end: 100, bottom: 10, height: 24 },
      { type: "inside" },
    ],
    series: [
      {
        name: "单位净值",
        type: "line",
        symbol: "none",
        lineStyle: { width: 1.5, color: "#4a7dcc" },
        itemStyle: { color: "#4a7dcc" },
        data: nav.dates.map(function(d, i) { return [d, nav.unitNav[i]]; }),
      },
      {
        name: "累计净值",
        type: "line",
        symbol: "none",
        lineStyle: { width: 1.5, color: "#52c41a" },
        itemStyle: { color: "#52c41a" },
        data: nav.dates.map(function(d, i) { return [d, nav.accNav[i]]; }),
        markPoint: {
          symbol: "circle",
          symbolSize: 6,
          data: buyPoints.map(function(p) {
            return {
              coord: p.coord,
              itemStyle: { color: "#ff6b6b", borderColor: "#ff4d4f", borderWidth: 2 },
              label: { show: true, position: "top", formatter: "B", color: "#333", fontSize: 11, fontWeight: "bold" },
            };
          }).concat(sellPoints.map(function(p) {
            return {
              coord: p.coord,
              itemStyle: { color: "#52c41a", borderColor: "#389e0d", borderWidth: 2 },
              label: { show: true, position: "top", formatter: "S", color: "#333", fontSize: 11, fontWeight: "bold" },
            };
          })),
        },
      },
    ],
  };

  _chart.setOption(option);

  const cur = nav.current;
  if (cur) {
    info.innerHTML = "当前单位净值：<strong>" + (cur.unitNav || "-") + "</strong>"
      + "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;当前累计净值：<strong>" + (cur.accNav || "-") + "</strong>";
  }

  window.addEventListener("resize", function() { if (_chart) _chart.resize(); });
}

function closeModal() {
  document.getElementById("chartModal").classList.remove("active");
  if (_chart) { _chart.dispose(); _chart = null; }
}

document.getElementById("chartModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

init();
</script>
</body>
</html>
