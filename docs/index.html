<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>长赢计划追踪</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #333;
      background: #f5f5f5;
      padding: 16px;
      margin: 0 auto;
    }

    /* ── Layout: sidebar + main ── */
    .app-layout {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 16px;
      max-width: 1140px;
      margin: 0 auto;
    }
    .sidebar {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 12px 0;
      align-self: start;
      position: sticky;
      top: 16px;
    }
    .sidebar-section { padding: 4px 0 8px; }
    .sidebar-section + .sidebar-section { border-top: 1px solid #f0f0f0; }
    .sidebar-label {
      font-size: 11px;
      color: #999;
      padding: 6px 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sidebar-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 9px 16px;
      border: none;
      background: transparent;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      text-align: left;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .sidebar-btn:hover { background: #fafbfc; color: #111; }
    .sidebar-btn.active {
      background: #f0f7ff;
      color: #1677ff;
      border-left-color: #1677ff;
      font-weight: 600;
    }
    .sidebar-btn[disabled] { opacity: 0.4; cursor: not-allowed; }
    .sidebar-btn .sidebar-badge {
      font-size: 10px;
      color: #aaa;
      font-weight: 400;
    }
    .main-area { min-width: 0; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-bottom: 2px solid #f0f0f0;
      background: #fff;
      padding: 0 12px;
      border-radius: 8px 8px 0 0;
    }
    .tab-btn {
      padding: 10px 24px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: #333; }
    .tab-btn.active { color: #1677ff; border-bottom-color: #1677ff; }

    /* ── Sub-tabs (2nd level inside 资产配置) ── */
    .subtab-bar {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      background: #fafbfc;
      border-radius: 6px;
      margin-bottom: 14px;
      border: 1px solid #f0f0f0;
    }
    .subtab-btn {
      padding: 6px 14px;
      border: 1px solid transparent;
      background: transparent;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .subtab-btn:hover { background: #fff; color: #111; }
    .subtab-btn.active {
      background: #fff;
      color: #1677ff;
      border-color: #d6e4ff;
      font-weight: 600;
    }
    .subtab-panel { display: none; }
    .subtab-panel.active { display: block; }

    /* Mobile: sidebar collapses to segmented control */
    @media (max-width: 760px) {
      .app-layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        padding: 6px;
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .sidebar-section { padding: 0; flex: 1; min-width: 0; display: flex; gap: 4px; }
      .sidebar-section + .sidebar-section { border-top: 0; border-left: 1px solid #f0f0f0; padding-left: 8px; margin-left: 4px; }
      .sidebar-label { display: none; }
      .sidebar-btn {
        padding: 6px 10px;
        border-left: 0;
        border-radius: 4px;
        font-size: 12px;
        flex: 1;
        justify-content: center;
      }
      .sidebar-btn.active { border-left: 0; background: #1677ff; color: #fff; }
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 16px;
    }

    /* ── Info Grid ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px 0;
    }
    .info-item { font-size: 13px; color: #555; }
    .info-item span { color: #111; font-weight: 500; }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-box {
      text-align: center;
      padding: 12px;
      background: #fafafa;
      border-radius: 6px;
      border: 1px solid #f0f0f0;
    }
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-num.green { color: #52c41a; }
    .stat-num.red { color: #ff4d4f; }
    .stat-num.blue { color: #1677ff; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    /* ── Signal filter + stats table + pager ── */
    .sig-filter { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .sig-filter-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid #d9d9d9; background: #fff; font-size: 12px; cursor: pointer; }
    .sig-filter-btn.active { border-color: #1677ff; color: #1677ff; background: #e6f4ff; }
    .sig-stats-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    .sig-stats-table th { text-align: center; padding: 6px 8px; background: #fafafa; border-bottom: 1px solid #f0f0f0; color: #666; font-weight: 500; }
    .sig-stats-table td { text-align: center; padding: 6px 8px; border-bottom: 1px solid #f5f5f5; }
    .sig-stats-table .sig-stat-label { text-align: left; color: #666; font-weight: 500; }
    .sig-stats-table .green { color: #52c41a; }
    .sig-stats-table .red { color: #ff4d4f; }
    .sig-stats-table .blue { color: #1677ff; }
    .sig-pager { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 12px; font-size: 12px; color: #888; }
    .sig-pager button { padding: 4px 10px; border: 1px solid #d9d9d9; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; }
    .sig-pager button:disabled { opacity: 0.4; cursor: default; }

    /* ── Timeline ── */
    .timeline { list-style: none; }
    .timeline-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0 10px 10px;
      border-bottom: 1px solid #f5f5f5;
      border-left: 3px solid transparent;
      font-size: 13px;
    }
    .timeline-item:last-child { border-bottom: none; }

    .tl-l1 {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid;
      flex-shrink: 0;
    }
    .dot.buy  { border-color: #52c41a; }
    .dot.sell { border-color: #ff4d4f; }

    .tl-date { color: #999; min-width: 80px; }

    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      min-width: 36px;
      text-align: center;
    }
    .badge.buy  { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .badge.sell { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; }

    .tl-fund { color: #555; flex: 1; min-width: 0; }
    .tl-fund-name { display: block; }
    .tl-article-title {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }
    .tl-unit { color: #111; font-weight: 600; min-width: 40px; text-align: right; }
    .tl-link { color: #1677ff; text-decoration: none; font-size: 12px; white-space: nowrap; }
    .tl-link:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .tl-article-title { max-width: calc(100vw - 200px); }
    }

    /* ── Holdings ── */
    .holding-item {
      border: 1px solid #f0f0f0;
      border-radius: 6px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .holding-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      background: #fafafa;
      transition: background 0.15s;
    }
    .holding-header:hover { background: #f0f0f0; }

    .holding-left { display: flex; align-items: center; gap: 10px; }
    .holding-arrow {
      font-size: 10px;
      color: #aaa;
      transition: transform 0.2s;
    }
    .holding-item.open .holding-arrow { transform: rotate(90deg); }
    .holding-code { font-size: 12px; color: #999; font-family: monospace; }
    .holding-name { font-size: 13px; color: #111; font-weight: 500; }

    .holding-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #555; }
    .holding-unit-label { color: #555; }
    .holding-unit { font-weight: 700; color: #1677ff; cursor: pointer; }
    .holding-unit:hover { text-decoration: underline; }
    .holding-latest { font-size: 12px; color: #aaa; }

    .holding-body {
      display: none;
      padding: 4px 16px 12px;
      border-top: 1px solid #f0f0f0;
      background: #fff;
    }
    .holding-item.open .holding-body { display: block; }

    /* ── Post Cards ── */
    .post-list { display: flex; flex-direction: column; gap: 10px; }
    .post-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }
    .post-header {
      padding: 14px 20px 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .post-header:hover { background: #fafafa; }
    .post-card.open .post-header { background: #fafafa; }
    .post-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .post-title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      line-height: 1.4;
      flex: 1;
    }
    .post-arrow {
      font-size: 10px;
      color: #bbb;
      margin-top: 4px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .post-card.open .post-arrow { transform: rotate(90deg); }
    .post-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #aaa;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .post-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
    }
    .post-tag.plan { background: #f0f7ff; color: #1677ff; border: 1px solid #d0e8ff; }
    .post-tag.audio { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
    .post-tag.sticky { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .post-tag.awesome { background: #fff0f6; color: #eb2f96; border: 1px solid #ffadd2; }
    .post-tag.author  { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }
    .post-summary {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-body {
      display: none;
      padding: 0 20px 16px;
      border-top: 1px solid #f5f5f5;
    }
    .post-card.open .post-body { display: block; }
    .post-content {
      font-size: 14px;
      line-height: 1.9;
      color: #333;
      padding-top: 16px;
    }
    .post-content p { margin-bottom: 6px; }
    .post-content img { max-width: 100%; border-radius: 4px; margin: 8px 0; }
    .post-content a { color: #1677ff; }
    .post-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #f5f5f5;
      font-size: 12px;
      color: #aaa;
    }
    .post-ext-link { color: #1677ff; text-decoration: none; }
    .post-ext-link:hover { text-decoration: underline; }

    .post-tag.elder { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }

    .elder-section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px dashed #e8e8e8;
    }
    .elder-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #722ed1;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .elder-item {
      margin-bottom: 14px;
      padding: 0 0 10px 0;
      border-bottom: 1px dotted #f0f0f0;
    }
    .elder-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .elder-quote {
      background: #fafafa;
      border-left: 3px solid #d9d9d9;
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 0 4px 4px 0;
      font-size: 12.5px;
      color: #666;
    }
    .elder-quote .quote-name { font-weight: 600; color: #555; margin-right: 8px; }
    .elder-quote .quote-meta { color: #aaa; font-size: 11px; margin-left: 6px; }
    .elder-quote .quote-content {
      margin-top: 4px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .elder-quote .quote-deeper {
      margin-top: 6px;
      padding: 4px 8px 4px 10px;
      border-left: 2px solid #e8e8e8;
      background: #fff;
      border-radius: 0 4px 4px 0;
      font-size: 11.5px;
      color: #888;
    }
    .elder-author {
      padding: 8px 12px;
      background: #f9f0ff;
      border-left: 3px solid #b37feb;
      border-radius: 0 4px 4px 0;
    }
    .elder-author .author-head {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #722ed1;
      margin-bottom: 4px;
    }
    .elder-author .author-head .author-name { font-weight: 600; }
    .elder-author .author-head .author-meta { color: #aaa; font-size: 11px; }
    .elder-author .author-content {
      font-size: 13.5px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .posts-empty {
      text-align: center;
      padding: 48px;
      color: #bbb;
      font-size: 14px;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 0 8px;
      font-size: 13px;
      color: #555;
    }
    .page-btn {
      padding: 6px 16px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: #1677ff; color: #1677ff; }
    .page-btn:disabled { color: #bbb; cursor: not-allowed; border-color: #f0f0f0; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      width: 90vw;
      max-width: 900px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #f0f0f0;
    }
    .modal-title { font-size: 16px; font-weight: 600; color: #1677ff; }
    .modal-close {
      width: 32px; height: 32px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 18px;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { background: #f5f5f5; color: #333; }

    .modal-body { padding: 0 24px 16px; flex: 1; overflow: auto; }

    .chart-container { width: 100%; height: 420px; }

    .nav-info {
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 12px 0;
      border-top: 1px solid #f0f0f0;
      margin-top: 8px;
      font-size: 14px;
      color: #555;
    }
    .nav-info strong { color: #111; font-weight: 600; }

    .chart-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 420px;
      color: #888;
      font-size: 14px;
    }

    /* ── Footer ── */
    .updated-at {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      padding: 8px 0;
    }

    /* ── Loading / Error ── */
    .loading, .error {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 14px;
    }
    .error { color: #ff4d4f; }

    /* ── Strategy tab ── */
    .st-philo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .st-philo { padding: 12px; background: linear-gradient(135deg, #f0f7ff 0%, #fafafa 100%); border-radius: 6px; border-left: 3px solid #1677ff; }
    .st-philo-title { font-weight: 600; font-size: 14px; color: #1677ff; margin-bottom: 4px; }
    .st-philo-desc { font-size: 12px; color: #555; line-height: 1.5; }
    .st-pred { padding: 12px; border: 1px solid #f0f0f0; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: box-shadow 0.15s; }
    .st-pred:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    .st-pred-row { display: flex; align-items: center; gap: 12px; }
    .st-pred-fund { flex: 1; min-width: 0; }
    .st-pred-name { font-weight: 600; font-size: 14px; color: #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .st-pred-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .st-cat { display: inline-block; padding: 1px 6px; background: #f5f5f5; border-radius: 3px; color: #666; font-size: 11px; }
    .st-dq-warn { display: inline-block; padding: 1px 6px; background: #fff7e6; border: 1px solid #ffd591; border-radius: 3px; color: #d46b08; font-size: 11px; cursor: help; margin-left: 4px; }
    .st-pred-ret { font-weight: 700; font-size: 16px; min-width: 60px; text-align: right; }
    .st-pred-signal { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 4px; min-width: 32px; text-align: center; }
    .st-pred-rule { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding-left: 4px; }
    .st-pred-rulename { font-size: 12px; color: #555; flex: 1; }
    .st-conf { width: 80px; height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
    .st-conf-bar { height: 100%; transition: width 0.3s; }
    .st-conf-num { font-size: 11px; color: #888; min-width: 32px; text-align: right; }
    .st-pred-threshold { margin-top: 8px; padding: 6px 10px; background: #fffbe6; border-radius: 4px; font-size: 12px; color: #8c6900; border-left: 2px solid #ffd666; }
    .st-pred-detail { margin-top: 10px; padding: 10px; background: #fafafa; border-radius: 4px; font-size: 12px; }
    .st-pred-desc { color: #444; line-height: 1.6; }
    .st-pred-source { color: #888; margin-top: 6px; font-size: 11px; }
    .st-pred-allsig { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; color: #666; font-size: 11px; }
    .st-other-sig { padding: 2px 0; color: #888; }
    .st-rules-section { margin-bottom: 16px; }
    .st-rules-section h4 { margin: 0 0 8px 0; font-size: 14px; color: #444; }
    .st-rule { padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .st-rule:last-child { border-bottom: none; }
    .st-rule-name { font-weight: 600; font-size: 13px; color: #333; }
    .st-rule-desc { font-size: 12px; color: #666; margin: 4px 0; line-height: 1.5; }
    .st-rule-src { font-size: 11px; color: #999; }

    /* ── Insights tab (组合洞察) ── */

    /* ── Analysis tab ── */

    /* ── Allocation: composition (图1) ── */

    .ac-last-action {

    .ac-fund-history {
      grid-column: 1 / -1;

    .ac-mr-chart { width: 100%; height: 90px; }

    /* Plan selector */

    .plan-bar-label { font-size: 12px; color: #888; }

      .tab-btn { padding: 10px 16px; font-size: 13px; }

  </style>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">投顾计划</div>
      <button class="sidebar-btn active" data-plan="150" onclick="switchPlan('150')">长赢 150 <span class="sidebar-badge">150份</span></button>
      <button class="sidebar-btn"        data-plan="s"   onclick="switchPlan('s')">长赢 S <span class="sidebar-badge">动态</span></button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">内容</div>
      <button class="sidebar-btn" data-view="posts" onclick="switchView('posts')">E大文章</button>
    </div>
  </aside>

  <main class="main-area">
    <div class="tab-bar" id="planTabBar">
      <button class="tab-btn active" data-tab="analysis" onclick="switchTab('analysis')">资产配置</button>
      <button class="tab-btn" data-tab="signals"  onclick="switchTab('signals')">信号追踪</button>
      <button class="tab-btn" data-tab="strategy" onclick="switchTab('strategy')">策略预测</button>
      <button class="tab-btn" data-tab="insights" onclick="switchTab('insights')">组合洞察</button>
    </div>

    <div id="tab-analysis"><div class="loading">加载中...</div></div>
    <div id="tab-signals"  style="display:none"><div class="loading">加载中...</div></div>
    <div id="tab-strategy" style="display:none"><div class="loading">加载中...</div></div>
    <div id="tab-insights" style="display:none"><div class="loading">加载中...</div></div>
    <div id="tab-posts"    style="display:none"><div class="loading">加载中...</div></div>
  </main>
</div>

<div class="modal-overlay" id="chartModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="chart-container" id="chartContainer">
        <div class="chart-loading">加载净值数据...</div>
      </div>
      <div class="nav-info" id="navInfo"></div>
    </div>
  </div>
</div>

<script>
const CONTENT_URL      = "./content.json";
const POSTS_INDEX_URL  = "./posts-index.json";
const POSTS_CONTENT    = "./posts/";
const ELDER_INDEX_URL  = "./posts/elder-index.json";
const NAV_BASE         = "./nav/";

const PLAN_FILES = {
  "150": { data: "./data.json",   analysis: "./analysis.json",   strategy: "./strategy.json"   },
  "s":   { data: "./data_s.json", analysis: "./analysis_s.json", strategy: "./strategy_s.json" },
};

const PAGE_SIZE = 50;

let _contentMap   = {};
let _postsIndex   = [];   // full index array
let _contentCache = {};   // id → content object (lazy loaded)
let _elderIndex   = {};   // postId → {elderCount, byAuthor, ...}
let _elderCache   = {};   // postId → full elder.json (lazy)
let _postsPage    = 0;
let _chart        = null;

// Plan-scoped data (loaded per plan, cached)
let _currentPlan  = "150";
let _planCache    = {}; // { "150": { data, analysis, strategy }, "s": {...} }
// Aliases pointing to current plan's data:
let _appData      = null;
let _analysis     = null;
let _strategy     = null;
let _allocation   = null;
let _allocationAll = null; // shared (loaded once, contains both plans)
let _taxonomyFunds = null; // taxonomy.json funds map (fundCode → {l1, l2, l3, display_name})
let _baseline = null; // allocation_baseline.json (E大 配置基线, LLM-classified)
let _insightsChart = null; // ECharts radar instance
let _trendChart   = null;
let _navChart      = null;

function extractItemId(url) {
  if (!url) return null;
  const m = url.match(/\/items\/(\d+)/);
  return m ? m[1] : null;
}

function fmt(d) { return d ? d.slice(0, 10) : "-"; }

function escHtml(s) {
  const el = document.createElement("span");
  el.textContent = String(s || "");
  return el.innerHTML;
}

/* ── View + tab + sub-tab + hash-route state ── */
let _currentView   = "plan";    // "plan" (uses 150/s + tabs) | "posts" (global)
let _currentTab    = "analysis";
let _currentSubTab = "snapshot"; // for analysis tab: snapshot | layered | timeseries

function switchView(view) {
  _currentView = view;
  const isPosts = view === "posts";
  document.getElementById("planTabBar").style.display = isPosts ? "none" : "flex";
  document.getElementById("tab-analysis").style.display = (!isPosts && _currentTab === "analysis") ? "block" : "none";
  document.getElementById("tab-signals").style.display  = (!isPosts && _currentTab === "signals")  ? "block" : "none";
  document.getElementById("tab-strategy").style.display = (!isPosts && _currentTab === "strategy") ? "block" : "none";
  document.getElementById("tab-insights").style.display = (!isPosts && _currentTab === "insights") ? "block" : "none";
  document.getElementById("tab-posts").style.display    = isPosts ? "block" : "none";
  document.querySelectorAll(".sidebar-btn[data-plan]").forEach(function(b) {
    b.classList.toggle("active", !isPosts && b.getAttribute("data-plan") === _currentPlan);
  });
  document.querySelectorAll(".sidebar-btn[data-view]").forEach(function(b) {
    b.classList.toggle("active", isPosts && b.getAttribute("data-view") === view);
  });
  syncHash();
  if (!isPosts && _currentTab === "analysis") resizeAnalysisCharts();
}

function switchTab(name) {
  _currentTab = name;
  // selecting any plan-scoped tab switches view back to plan
  if (_currentView === "posts") _currentView = "plan";
  document.querySelectorAll(".tab-btn").forEach(function(b) {
    b.classList.toggle("active", b.getAttribute("data-tab") === name);
  });
  switchView("plan");
}

function switchSubTab(name) {
  _currentSubTab = name;
  document.querySelectorAll(".subtab-btn").forEach(function(b) {
    b.classList.toggle("active", b.getAttribute("data-subtab") === name);
  });
  document.querySelectorAll(".subtab-panel").forEach(function(p) {
    p.classList.toggle("active", p.getAttribute("data-subtab") === name);
  });
  syncHash();
  resizeAnalysisCharts();
}

/* Toggle inline expansion of a fund row in the composition table */
function toggleFundRow(code) {
  const row  = document.querySelector('.ac-fund-row[data-fund="' + code + '"]');
  const hist = document.querySelector('.ac-fund-history[data-fund="' + code + '"]');
  if (!row) return;
  const open = row.classList.toggle("expanded");
  if (hist) hist.style.display = open ? "block" : "none";
  const tog = row.querySelector(".ac-fund-toggle");
  if (tog) tog.classList.toggle("open", open);
}

/* Hash routing:
   #posts                          (global content view)
   #150/analysis/snapshot          (plan view: plan/tab/[subtab])
*/
function syncHash() {
  if (_currentView === "posts") {
    history.replaceState(null, "", "#posts");
    return;
  }
  const sub = _currentTab === "analysis" ? "/" + _currentSubTab : "";
  history.replaceState(null, "", "#" + _currentPlan + "/" + _currentTab + sub);
}
function applyHash() {
  const h = location.hash || "";
  if (h === "#posts") { _currentView = "posts"; return; }
  const m = h.match(/^#(150|s)(?:\/([a-z]+))?(?:\/([a-z]+))?/);
  if (!m) return;
  const plan = m[1], tab = m[2], sub = m[3];
  if (plan && plan !== _currentPlan) {
    setTimeout(function(){ switchPlan(plan); }, 0);
  }
  if (tab) _currentTab = tab;
  if (sub) _currentSubTab = sub;
}

function resizeAnalysisCharts() {
  // requestAnimationFrame ensures the layout has been computed after display change
  requestAnimationFrame(function() {
    ['acSunburst', 'acTrendChart', 'acNavChart', 'insRadar'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el && el._chart) el._chart.resize();
    });
    document.querySelectorAll('[id^="acMr_"]').forEach(function(el) {
      if (el._chart) el._chart.resize();
    });
  });
}

/* ── Plan switching ── */
async function loadPlan(plan) {
  if (_planCache[plan]) return _planCache[plan];
  const files = PLAN_FILES[plan];
  if (!files) throw new Error("Unknown plan: " + plan);

  const [dataRes, anaRes, stratRes] = await Promise.all([
    fetch(files.data),
    fetch(files.analysis).catch(function() { return null; }),
    fetch(files.strategy).catch(function() { return null; }),
  ]);
  if (!dataRes.ok) throw new Error("HTTP " + dataRes.status + " for " + files.data);

  const cached = { data: await dataRes.json(), analysis: null, strategy: null };
  if (anaRes && anaRes.ok)     cached.analysis = await anaRes.json();
  if (stratRes && stratRes.ok) cached.strategy = await stratRes.json();
  _planCache[plan] = cached;
  return cached;
}

async function loadAllocation() {
  if (_allocationAll) return _allocationAll;
  try {
    // Load qieman authoritative + taxonomy + our internal calc in parallel
    const [allocR, qieR, taxR] = await Promise.all([
      fetch("./allocation.json").catch(function() { return null; }),
      fetch("./qieman_allocation.json").catch(function() { return null; }),
      fetch("./taxonomy.json").catch(function() { return null; }),
    ]);
    const allocJson = (allocR && allocR.ok) ? await allocR.json() : { plans: {}, asset_classes: [] };
    const qieJson = (qieR && qieR.ok) ? await qieR.json() : null;
    const taxJson = (taxR && taxR.ok) ? await taxR.json() : null;
    if (taxJson && taxJson.funds) _taxonomyFunds = taxJson.funds;

    // Override per-plan from qieman authoritative data when available
    if (qieJson && qieJson.plans && taxJson) {
      for (const planId of Object.keys(qieJson.plans)) {
        const qiePlan = qieJson.plans[planId];
        if (!qiePlan || !qiePlan.composition) continue;
        const built = buildAllocationFromQieman(qiePlan, taxJson, planId);
        allocJson.plans[planId] = built;
      }
      allocJson._qiemanSource = qieJson.source;
      allocJson._qiemanGeneratedAt = qieJson.generatedAt;
    }
    _allocationAll = allocJson;
    return _allocationAll;
  } catch (e) {
    console.error('loadAllocation failed:', e);
    return null;
  }
}

/* Build {current, timeseries, updatedAt} from qieman composition + taxonomy.
   Priority: qieman supplies authoritative L1 percent + per-fund percent/units/累计.
   Taxonomy maps each fundCode → l1/l2/l3 for sunburst aggregation. */
function buildAllocationFromQieman(qiePlan, taxJson, planId) {
  const comp = qiePlan.composition;
  const taxFunds = taxJson.funds || {};
  const L1_ORDER = ["A股","海外新兴","海外成熟","商品","债券","房地产","外汇","现金","其他"];

  // Use middle palette shade as legend color (must match SUNBURST_PALETTE depth 1)
  const L1_COLOR = {
    "A股":"#CC8987","海外新兴":"#6FA0AF","海外成熟":"#84B0BF",
    "商品":"#CDA77D","债券":"#9494B5","房地产":"#A4B58A","外汇":"#88AAA3",
    "现金":"#BDB8AD","其他":"#B0B0B0",
  };

  // ── by_category (and gather funds per L1 for taxonomy build) ──
  const by_category = [];
  const fundsByL1 = {};
  for (const l1 of L1_ORDER) {
    const c = comp.by_l1[l1];
    if (!c) continue;
    const fundsArr = (c.funds || []).map(function(f) {
      const tax = taxFunds[f.code] || {};
      return {
        code:        f.code,
        name:        f.variety || f.name,
        fullName:    f.name,
        units:       f.units,
        share_pct:   f.percent,
        return_pct:  f.accProfit,
        last_trade:  f.navDate,
        status:      f.units > 0 ? 'active' : 'cleared',
        l2:          tax.l2 || '其他',
        l3:          tax.l3 || '其他',
      };
    });
    fundsByL1[l1] = fundsArr;

    if (l1 === "现金") {
      if (c.percent > 0) {
        by_category.push({
          class: l1, label: l1, color: L1_COLOR[l1],
          units: c.units, share_pct: c.percent, return_pct: null, funds: [],
        });
      }
      continue;
    }
    if (c.percent <= 0 && fundsArr.length === 0) continue;
    // Sort funds: active by share desc, cleared by date desc
    const active = fundsArr.filter(function(f){return f.status==='active';})
                          .sort(function(a,b){return b.share_pct - a.share_pct;});
    const cleared = fundsArr.filter(function(f){return f.status==='cleared';})
                            .sort(function(a,b){return (b.last_trade||'').localeCompare(a.last_trade||'');});
    by_category.push({
      class: l1, label: l1, color: L1_COLOR[l1],
      units: c.units, share_pct: c.percent,
      return_pct: c.accProfitRate,
      funds: active.concat(cleared),
    });
  }

  // ── by_taxonomy (3-layer sunburst: L1 → L2 → L3) ──
  const tree = {};
  for (const l1 of Object.keys(fundsByL1)) {
    if (l1 === "现金") continue;
    for (const f of fundsByL1[l1]) {
      const tax = taxFunds[f.code];
      if (!tax) continue;
      const taxL1 = tax.l1; // trust taxonomy l1 (should match qieman)
      const l2 = tax.l2 || "(其他)";
      const l3 = tax.l3 || "(其他)";

      const l1Node = tree[taxL1] = tree[taxL1] || { value:0, units:0, children:{} };
      const l2Node = l1Node.children[l2] = l1Node.children[l2] || { value:0, units:0, children:{} };
      const l3Node = l2Node.children[l3] = l2Node.children[l3] || { value:0, units:0 };

      if (f.status === 'active' && f.share_pct > 0) {
        l3Node.value += f.share_pct;
        l3Node.units += f.units;
        l2Node.value += f.share_pct;
        l2Node.units += f.units;
        l1Node.value += f.share_pct;
        l1Node.units += f.units;
      }
    }
  }

  // Convert nested → ordered array shape consumed by frontend
  const by_taxonomy = [];
  for (const l1 of L1_ORDER) {
    if (l1 === "现金") continue;
    const node = tree[l1];
    if (!node || node.value <= 0) continue;
    const l2arr = Object.keys(node.children).map(function(l2name) {
      const l2n = node.children[l2name];
      const l3arr = Object.keys(l2n.children).map(function(l3name) {
        const l3n = l2n.children[l3name];
        return { name: l3name, value: l3n.value, units: l3n.units, share_pct: l3n.value };
      }).sort(function(a,b){return b.value - a.value;});
      return { name: l2name, value: l2n.value, units: l2n.units, share_pct: l2n.value, children: l3arr };
    }).sort(function(a,b){return b.value - a.value;});
    by_taxonomy.push({
      name: l1, value: node.value, units: node.units, share_pct: node.value,
      color: L1_COLOR[l1], children: l2arr,
    });
  }

  const cashEntry = comp.by_l1["现金"] || { units: 0, percent: 0 };
  const totalUnits = comp.investedUnit + cashEntry.units;

  return {
    current: {
      total_unit: totalUnits,
      invested_unit: comp.investedUnit,
      cash_unit: cashEntry.units,
      by_category: by_category,
      by_taxonomy: by_taxonomy,
    },
    timeseries: qiePlan.timeseries || [],
    nav_history: qiePlan.nav_history || [],
    updatedAt: comp.navDate,
    _source: 'qieman',
    _meta: {
      nav: comp.nav, dailyReturn: comp.dailyReturn,
      fromSetupReturn: comp.fromSetupReturn, annualReturn: comp.annualReturn,
      maxDrawdown: comp.maxDrawdown, sharpe: comp.sharpe,
    },
  };
}

async function switchPlan(plan) {
  // Clicking a plan in sidebar always returns to plan view
  if (_currentView === "posts") {
    _currentView = "plan";
    switchView("plan");
  }
  if (plan === _currentPlan && _appData) {
    document.querySelectorAll(".sidebar-btn[data-plan]").forEach(function(b) {
      b.classList.toggle("active", b.getAttribute("data-plan") === plan);
    });
    return;
  }
  document.querySelectorAll(".sidebar-btn[data-plan]").forEach(function(b) {
    b.classList.toggle("active", b.getAttribute("data-plan") === plan);
  });
  syncHash();

  // Show loading state
  document.getElementById("tab-signals").innerHTML  = '<div class="loading">切换到 ' + plan + ' 计划...</div>';
  document.getElementById("tab-strategy").innerHTML = '<div class="loading">切换中...</div>';
  document.getElementById("tab-analysis").innerHTML = '<div class="loading">切换中...</div>';
  document.getElementById("tab-insights").innerHTML = '<div class="loading">切换中...</div>';

  try {
    const c = await loadPlan(plan);
    _currentPlan = plan;
    _appData  = c.data;
    _analysis = c.analysis;
    _strategy = c.strategy;
    _allocation = _allocationAll && _allocationAll.plans && _allocationAll.plans[plan] || null;
    renderAllForCurrentPlan();
  } catch (e) {
    document.getElementById("tab-signals").innerHTML = '<div class="error">' + plan + ' 计划加载失败：' + e.message + '</div>';
  }
}

function renderAllForCurrentPlan() {
  const sigTab = document.getElementById("tab-signals");

async function init() {
  try {
    // Apply hash before loading so plan choice is honored
    applyHash();

    // Posts/content are global (not plan-scoped)
    const [contentRes, indexRes, elderIdxRes] = await Promise.all([
      fetch(CONTENT_URL).catch(function() { return null; }),
      fetch(POSTS_INDEX_URL).catch(function() { return null; }),
      fetch(ELDER_INDEX_URL).catch(function() { return null; }),
    ]);
    if (contentRes && contentRes.ok) _contentMap = await contentRes.json();
    if (indexRes && indexRes.ok)     _postsIndex = await indexRes.json();
    if (elderIdxRes && elderIdxRes.ok) _elderIndex = await elderIdxRes.json();

    // Load default plan (150) and allocation in parallel
    const [c, alloc, baselineRes] = await Promise.all([
      loadPlan(_currentPlan),
      loadAllocation(),
      fetch("./allocation_baseline.json").catch(function() { return null; }),
    ]);
    _appData  = c.data;
    _analysis = c.analysis;
    _strategy = c.strategy;
    _allocation = alloc && alloc.plans && alloc.plans[_currentPlan] || null;
    if (baselineRes && baselineRes.ok) _baseline = await baselineRes.json();

    renderAllForCurrentPlan();
    renderPostsTab();

    // Sync UI state to hash (default = analysis/snapshot)
    if (_currentView === "posts") {
      switchView("posts");
    } else {
      switchTab(_currentTab);
      if (_currentTab === "analysis") switchSubTab(_currentSubTab);
    }

  } catch (e) {
    document.getElementById("tab-analysis").innerHTML = '<div class="error">数据加载失败：' + e.message + "</div>";
  }
}

/* ── Signals tab ── */
var _signalFilter = 'all';
var _signalPage = 0;
var _signalPageSize = 10;
var _allTradesCache = null;

function buildAllTrades(d) {
  if (_allTradesCache) return _allTradesCache;
  var trades = [];
  for (var i = 0; i < d.holdings.length; i++) {
    var h = d.holdings[i];
    var tax = _taxonomyFunds && _taxonomyFunds[h.fundCode] || {};
    for (var j = 0; j < h.history.length; j++) {
      var r = h.history[j];
      trades.push({
        date: r.date,
        action: r.action,
        unit: r.unit || 1,
        fundCode: h.fundCode,
        fundName: h.fundName,
        articleLink: r.articleLink,
        l1: r.l1 || h.l1 || tax.l1 || '其他',
        l2: tax.l2 || '其他',
        l3: tax.l3 || '其他',
      });
    }
  }
  trades.sort(function(a, b) { return b.date.localeCompare(a.date); });
  _allTradesCache = trades;
  return trades;
}

function renderSignalRow(t) {
  var itemId = extractItemId(t.articleLink);
  var articleTitle = itemId && _contentMap[itemId] ? _contentMap[itemId].title : '';
  var titleSpan = articleTitle
    ? '<span class="tl-article-title" data-title="' + escHtml(articleTitle) + '"></span>'
    : '';
  var linkHtml = t.articleLink
    ? '<a class="tl-link" href="' + escHtml(t.articleLink) + '" target="_blank" rel="noopener">&#x1F517; 发车文章</a>'
    : '';
  return '<li class="timeline-item"' + l1StripeStyle(t.l1) + '>'
    + '<span class="dot ' + t.action + '"></span>'
    + '<span class="tl-date">' + fmt(t.date) + '</span>'
    + '<span class="badge ' + t.action + '">' + (t.action === 'buy' ? '买入' : '卖出') + '</span>'
    + l1BadgeHtml(t.l1)
    + '<span class="tl-fund"><span class="tl-fund-name">' + escHtml(t.fundCode) + '&nbsp;&nbsp;' + escHtml(t.fundName) + '</span>' + titleSpan + '</span>'
    + '<span class="tl-unit">' + t.unit + ' 份</span>'
    + linkHtml
    + '</li>';
}

function renderTradesPanel(d) {
  var trades = buildAllTrades(d);
  var filtered = _signalFilter === 'all' ? trades : trades.filter(function(t) { return t.l1 === _signalFilter; });
  var total = filtered.length;
  var totalPages = Math.ceil(total / _signalPageSize);
  if (_signalPage >= totalPages) _signalPage = Math.max(0, totalPages - 1);
  var start = _signalPage * _signalPageSize;
  var page = filtered.slice(start, start + _signalPageSize);

  var l1Counts = {};
  var L1_ORDER = ['A股','海外新兴','海外成熟','商品','债券'];
  trades.forEach(function(t) { l1Counts[t.l1] = (l1Counts[t.l1] || 0) + 1; });

  var filterHtml = '<div class="sig-filter">'
    + '<button class="sig-filter-btn' + (_signalFilter === 'all' ? ' active' : '') + '" onclick="setSignalFilter(\'all\')">全部 ' + trades.length + '</button>';
  L1_ORDER.forEach(function(l1) {
    if (!l1Counts[l1]) return;
    var s = l1Style(l1);
    filterHtml += '<button class="sig-filter-btn' + (_signalFilter === l1 ? ' active' : '') + '" style="' + s.badge + '" onclick="setSignalFilter(\'' + l1 + '\')">' + l1 + ' ' + l1Counts[l1] + '</button>';
  });
  filterHtml += '</div>';

  var rowsHtml = '';
  for (var i = 0; i < page.length; i++) rowsHtml += renderSignalRow(page[i]);

  var pageHtml = '';
  if (totalPages > 1) {
    pageHtml = '<div class="sig-pager">'
      + '<button' + (_signalPage > 0 ? ' onclick="setSignalPage(' + (_signalPage - 1) + ')"' : ' disabled') + '>&laquo; 上一页</button>'
      + '<span>' + (_signalPage + 1) + ' / ' + totalPages + '（共 ' + total + ' 条）</span>'
      + '<button' + (_signalPage < totalPages - 1 ? ' onclick="setSignalPage(' + (_signalPage + 1) + ')"' : ' disabled') + '>下一页 &raquo;</button>'
      + '</div>';
  }

  return '<div class="card">'
    + '<div class="card-title">全部交易记录</div>'
    + filterHtml
    + '<ul class="timeline">' + rowsHtml + '</ul>'
    + pageHtml
    + '</div>';
}

function setSignalFilter(l1) {
  _signalFilter = l1;
  _signalPage = 0;
  refreshTradesPanel();
}
function setSignalPage(p) {
  _signalPage = p;
  refreshTradesPanel();

function renderSignalStats(d) {
  var L1_ORDER = ['A股','海外新兴','海外成熟','商品','债券'];
  var stats = {};
  L1_ORDER.forEach(function(l1) { stats[l1] = { buy: 0, sell: 0, hold: 0 }; });
  for (var i = 0; i < d.holdings.length; i++) {
    var h = d.holdings[i];
    var l1 = h.l1 || '其他';
    if (!stats[l1]) stats[l1] = { buy: 0, sell: 0, hold: 0 };
    stats[l1].buy += h.bought;
    stats[l1].sell += h.sold;
    stats[l1].hold += h.currentUnit;
  }
  var header = '<tr><th></th>';
  var rowBuy = '<tr><td class="sig-stat-label">买入</td>';
  var rowSell = '<tr><td class="sig-stat-label">卖出</td>';
  var rowHold = '<tr><td class="sig-stat-label">持仓</td>';
  var totB = 0, totS = 0, totH = 0;
  L1_ORDER.forEach(function(l1) {
    var s = stats[l1];
    if (!s || (s.buy === 0 && s.sell === 0 && s.hold === 0)) return;
    header += '<th>' + l1 + '</th>';
    rowBuy += '<td class="green">' + s.buy + '</td>';
    rowSell += '<td class="red">' + s.sell + '</td>';

  });

  rowSell += '<td class="red"><b>' + totS + '</b></td></tr>';
  rowHold += '<td class="blue"><b>' + totH + '</b></td></tr>';

    + '<div class="card-title">数据统计</div>'
    + '<table class="sig-stats-table">' + header + rowBuy + rowSell + rowHold + '</table>'

function renderSignalHoldings(d) {
  if (!_taxonomyFunds) return '';
  var L1_ORDER = ['A股','海外新兴','海外成熟','商品','债券','房地产','外汇','现金'];
  var L2_ORDER = {
    'A股': ['大盘','中小盘','行业','价值红利'],
    '海外新兴': ['香港','海外科技'],
    '海外成熟': ['美国大盘','欧洲','全球医药'],
    '商品': ['黄金','原油'],
    '债券': ['国内债券','海外债券'],
  };

  function l2Sort(l1) {
    var order = L2_ORDER[l1];
    if (!order) return function(a, b) { return a.localeCompare(b); };
    return function(a, b) {
      var ia = order.indexOf(a), ib = order.indexOf(b);
      if (ia < 0) ia = 999;
      if (ib < 0) ib = 999;
      return ia - ib;
    };
  }

  var tree = {};
  for (var i = 0; i < d.holdings.length; i++) {
    var h = d.holdings[i];
    var tax = _taxonomyFunds[h.fundCode] || {};
    var l1 = tax.l1 || h.l1 || '其他';
    var l2 = tax.l2 || '其他';
    var l3 = tax.l3 || '其他';
    if (!tree[l1]) tree[l1] = {};
    if (!tree[l1][l2]) tree[l1][l2] = {};
    if (!tree[l1][l2][l3]) tree[l1][l2][l3] = [];
    tree[l1][l2][l3].push(h);
  }

  var html = '';
  var l3Counter = 0;
  L1_ORDER.forEach(function(l1) {
    if (!tree[l1]) return;
    var l1Funds = 0, l1Units = 0, l1Trades = 0;
    Object.keys(tree[l1]).forEach(function(l2) {
      Object.keys(tree[l1][l2]).forEach(function(l3) {
        tree[l1][l2][l3].forEach(function(h) { l1Funds++; l1Units += h.currentUnit; l1Trades += h.history.length; });
      });
    });
    var color = L1_COLORS[l1] || L1_COLORS['其他'];
    html += '<div class="ac-cls-block">'
      + '<div class="ac-cls-head">'
      + '<span class="ac-cls-dot" style="background:' + color + '"></span>'
      + '<span class="ac-cls-name">' + escHtml(l1) + '</span>'
      + '<span class="ac-cls-meta">' + l1Funds + '只 · ' + l1Units + '份 · ' + l1Trades + '笔</span>'
      + '</div>';

    var l2Keys = Object.keys(tree[l1]).sort(l2Sort(l1));
    l2Keys.forEach(function(l2) {
        var l2Funds = [], l2Units = 0, l2AllTrades = [];
        Object.keys(tree[l1][l2]).forEach(function(l3) {
          tree[l1][l2][l3].forEach(function(h) {
            l2Funds.push(h);
            l2Units += h.currentUnit;
            h.history.slice().sort(function(a, b) { return b.date.localeCompare(a.date); }).forEach(function(r) {
              l2AllTrades.push({
                date: r.date, action: r.action, unit: r.unit || 1,
                fundCode: h.fundCode, fundName: h.fundName,
                articleLink: r.articleLink, l1: r.l1 || h.l1,
              });
            });
          });
        });
        l2AllTrades.sort(function(a, b) { return b.date.localeCompare(a.date); });

        var l2TradesHtml = '';
        for (var k = 0; k < l2AllTrades.length; k++) {
          var t = l2AllTrades[k];
          var itemId = extractItemId(t.articleLink);
          var articleTitle = itemId && _contentMap[itemId] ? _contentMap[itemId].title : '';
          var titleSpan = articleTitle
            ? '<span class="tl-article-title" data-title="' + escHtml(articleTitle) + '"></span>'
            : '';
          var tLink = t.articleLink
            ? '<a class="tl-link" href="' + escHtml(t.articleLink) + '" target="_blank" rel="noopener">&#x1F517; 发车文章</a>'
            : '';
          l2TradesHtml += '<li class="timeline-item"' + l1StripeStyle(t.l1) + '>'
            + '<span class="dot ' + t.action + '"></span>'
            + '<span class="tl-date">' + fmt(t.date) + '</span>'
            + '<span class="badge ' + t.action + '">' + (t.action === 'buy' ? '买入' : '卖出') + '</span>'
            + '<span class="tl-fund"><span class="tl-fund-name">' + escHtml(t.fundCode) + '&nbsp;&nbsp;' + escHtml(t.fundName) + '</span>' + titleSpan + '</span>'
            + '<span class="tl-unit">' + t.unit + ' 份</span>'
            + tLink
            + '</li>';
        }

        var sl2id = 'sig-l2-' + (l3Counter++);
        html += '<div class="ac-l2-block">'
          + '<div class="ac-l2-head" onclick="toggleL3(\'' + sl2id + '\')" style="cursor:pointer">'
          + '<span class="ac-l3-toggle" id="' + sl2id + '-tog">▶</span>'
          + '<span class="ac-l2-name">' + escHtml(l2) + '</span>'

function renderPostsTab() {
  if (!_postsIndex.length) {
    document.getElementById("tab-posts").innerHTML = '<div class="posts-empty">暂无文章数据</div>';
    return;
  }
  document.getElementById("tab-posts").innerHTML = buildPostsHtml();
}

function buildPostsHtml() {
  const total = _postsIndex.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = _postsPage * PAGE_SIZE;
  const page  = _postsIndex.slice(start, start + PAGE_SIZE);

  const header = '<div class="card" style="margin-bottom:12px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">'
    + '<span style="font-size:13px;color:#555;">共 <strong>' + total + '</strong> 篇 · 点击标题展开全文</span>'
    + '<span style="font-size:12px;color:#aaa;">且慢 · 微博</span>'
    + '</div>';

  let listHtml = '<div class="post-list">';
  for (let i = 0; i < page.length; i++) {
    const p = page[i];
    const pid = "post-" + escHtml(String(p.id));
    const srcLabel = p.source === "weibo" ? "微博" : "且慢";

    let tags = "";
    if (p.author)    tags += '<span class="post-tag author">' + escHtml(p.author) + '</span>';
    if (p.isRetweet) tags += '<span class="post-tag" style="background:#fafafa;color:#aaa;border:1px solid #e8e8e8;">转发</span>';
    if (p.isSticky)  tags += '<span class="post-tag sticky">置顶</span>';
    if (p.isAwesome) tags += '<span class="post-tag awesome">精华</span>';
    if (p.poCode && p.poCode.length) tags += '<span class="post-tag plan">长赢</span>';
    if (p.hasAudio)  tags += '<span class="post-tag audio">🎵</span>';

    const elderEntry = _elderIndex[String(p.id)];
    if (elderEntry && elderEntry.elderCount) {
      const parts = [];
      const ba = elderEntry.byAuthor || {};
      if (ba["ETF拯救世界"]) parts.push("E大 " + ba["ETF拯救世界"]);
      if (ba["新米练习菌"]) parts.push("新米 " + ba["新米练习菌"]);
      const label = parts.length ? parts.join(" · ") : ("作者 " + elderEntry.elderCount);
      tags += '<span class="post-tag elder">💬 ' + escHtml(label) + '</span>';
    }

    const meta = '<span>' + escHtml(p.date || "-") + '</span>'
      + '<span>' + srcLabel + '</span>'
      + (p.likeNum    ? '<span>👍 ' + p.likeNum    + '</span>' : '')
      + (p.commentNum ? '<span>💬 ' + p.commentNum + '</span>' : '')
      + tags;

    const summary = p.summary
      ? '<div class="post-summary">' + escHtml(p.summary) + '</div>'
      : "";

    listHtml += '<div class="post-card" id="' + pid + '">'
      + '<div class="post-header" onclick="togglePost(\'' + pid + '\',\'' + escHtml(String(p.id)) + '\')">'
      + '<div class="post-title-row">'
      + '<div class="post-title">' + escHtml(p.title || "（无标题）") + '</div>'
      + '<span class="post-arrow">&#x25B6;</span>'
      + '</div>'
      + '<div class="post-meta">' + meta + '</div>'
      + summary
      + '</div>'
      + '<div class="post-body" data-loaded="false"></div>'
      + '</div>';
  }
  listHtml += '</div>';

  const pagination = '<div class="pagination">'
    + '<button class="page-btn" onclick="gotoPage(' + (_postsPage - 1) + ')"'
    + (_postsPage === 0 ? ' disabled' : '') + '>上一页</button>'
    + '<span>第 ' + (_postsPage + 1) + ' / ' + totalPages + ' 页</span>'
    + '<button class="page-btn" onclick="gotoPage(' + (_postsPage + 1) + ')"'
    + (_postsPage >= totalPages - 1 ? ' disabled' : '') + '>下一页</button>'
    + '</div>';

  return header + listHtml + pagination;
}

function gotoPage(page) {
  _postsPage = page;
  document.getElementById("tab-posts").innerHTML = buildPostsHtml();
  document.getElementById("tab-posts").scrollIntoView({ behavior: "smooth", block: "start" });
}

async function togglePost(pid, postId) {
  const card = document.getElementById(pid);
  const wasOpen = card.classList.contains("open");
  card.classList.toggle("open");

  if (!wasOpen) {
    const body = card.querySelector(".post-body");
    if (body.getAttribute("data-loaded") === "false") {
      body.innerHTML = '<div style="padding:16px;color:#aaa;font-size:13px;">加载中...</div>';
      try {
        let content = _contentCache[postId];
        if (!content) {
          const res = await fetch(POSTS_CONTENT + postId + ".json");
          if (!res.ok) throw new Error("HTTP " + res.status);
          content = await res.json();
          _contentCache[postId] = content;
        }
        const clean = DOMPurify.sanitize(content.richContent || "<p>（正文暂无内容）</p>");
        const srcLink = '<a class="post-ext-link" href="' + escHtml(content.url || "") + '" target="_blank" rel="noopener">查看原文 ↗</a>';
        const audioLink = content.audioUrl
          ? '<a class="post-ext-link" href="' + escHtml(content.audioUrl) + '" target="_blank" rel="noopener">🎵 音频版</a>'
          : "";
        let retweetHtml = "";
        if (content.retweetContent) {
          const rtClean = DOMPurify.sanitize(content.retweetContent);
          retweetHtml = '<div style="margin-top:12px;padding:12px 16px;background:#fafafa;border-left:3px solid #d9d9d9;border-radius:0 4px 4px 0;">'
            + '<div style="font-size:12px;color:#aaa;margin-bottom:6px;">转发自 @' + escHtml(content.retweetAuthor || "") + '</div>'
            + '<div class="post-content" style="font-size:13px;">' + rtClean + '</div>'
            + '</div>';
        }
        body.innerHTML = '<div class="post-content">' + clean + '</div>'
          + retweetHtml
          + '<div class="elder-mount"></div>'
          + '<div class="post-footer">' + srcLink
          + '<div style="display:flex;gap:12px;">' + audioLink + '</div></div>';
        body.setAttribute("data-loaded", "true");
        loadElderSection(postId, body.querySelector(".elder-mount"));
      } catch(e) {
        body.innerHTML = '<div style="padding:16px;color:#ff4d4f;font-size:13px;">加载失败：' + e.message + '</div>';
      }
    }
  }
}

async function loadElderSection(postId, mount) {
  if (!mount) return;
  const idxEntry = _elderIndex[String(postId)];
  if (!idxEntry || !idxEntry.elderCount) return;
  try {
    let data = _elderCache[postId];
    if (!data) {
      const res = await fetch(POSTS_CONTENT + postId + "-elder.json");
      if (!res.ok) return;
      data = await res.json();
      _elderCache[postId] = data;
    }
    if (!data.items || !data.items.length) return;
    mount.innerHTML = renderElderHtml(data.items);
  } catch (e) {
    // silent — elder data is non-critical
  }
}

function renderElderHtml(items) {
  const head = '<div class="elder-section-title">📌 作者补充评论 (' + items.length + ')</div>';
  let body = "";
  for (const it of items) {
    body += '<div class="elder-item">' + renderElderItem(it) + '</div>';
  }
  return '<div class="elder-section">' + head + body + '</div>';
}

function fmtElderTime(s) {
  if (!s) return "";
  // "2026-04-15T18:16:49" → "2026-04-15 18:16"
  return s.replace("T", " ").slice(0, 16);
}

function renderAuthorBlock(it) {
  const meta = '<span class="author-meta">' + escHtml(fmtElderTime(it.createdAt))
    + (it.ipLocation ? ' · ' + escHtml(it.ipLocation) : '')
    + (it.likeNum ? ' · 👍 ' + it.likeNum : '')
    + '</span>';
  return '<div class="elder-author">'
    + '<div class="author-head">'
    + '<span class="author-name">' + escHtml(it.author || "") + '</span>'
    + '<span class="post-tag author" style="font-size:10px;padding:1px 5px;">作者</span>'
    + meta
    + '</div>'
    + '<div class="author-content">' + escHtml(it.content || "") + '</div>'
    + '</div>';
}

function renderQuoteBlock(parent, deeper) {
  const meta = '<span class="quote-meta">' + escHtml(fmtElderTime(parent.createdAt))
    + (parent.ipLocation ? ' · ' + escHtml(parent.ipLocation) : '')
    + (parent.likeNum ? ' · 👍 ' + parent.likeNum : '')
    + '</span>';
  let deeperHtml = "";
  if (deeper) {
    deeperHtml = '<div class="quote-deeper">'
      + '<span class="quote-name">' + escHtml(deeper.userName || "") + '：</span>'
      + escHtml(deeper.content || "")
      + '</div>';
  }
  return '<div class="elder-quote">'
    + '<div><span class="quote-name">' + escHtml(parent.userName || "") + '</span>' + meta + '</div>'
    + '<div class="quote-content">' + escHtml(parent.content || "") + '</div>'
    + deeperHtml
    + '</div>';
}

function renderElderItem(it) {
  if (it.type === "top") {
    return renderAuthorBlock(it);
  }
  // reply: parent quote (+ optional deeper replyTo) followed by author response
  return (it.parent ? renderQuoteBlock(it.parent, it.replyTo) : "")
    + renderAuthorBlock(it);
}

/* Map baseline axis id → allocation.json category label + optional fund-filter.
   For 可转债 / 红利低波 we subset of a broader category via taxonomy.l3 match. */
const INSIGHT_AXES = [
  { id: 'a_stock',         label: 'A股',        match: { category: 'A股' } },
  { id: 'em_overseas',     label: '海外新兴',   match: { category: '海外新兴' } },
  { id: 'dm_overseas',     label: '海外成熟',   match: { category: '海外成熟' } },
  { id: 'commodities',     label: '商品',       match: { category: '商品' } },
  { id: 'bonds',           label: '债券',       match: { category: '债券' } },
  { id: 'cash',            label: '现金',       match: { category: '现金' } },
  { id: 'convertibles',    label: '可转债',     match: { taxonomy_l3: '可转债' } },
  { id: 'dividend_lowvol', label: '红利/低波',  match: { taxonomy_l2: '价值红利' } },
];

/* Compute actual pct for each axis from current allocation. */
function computeActualAllocation() {
  if (!_allocation || !_allocation.current) return {};
  const cur = _allocation.current;
  const cats = cur.by_category || [];
  const out = {};
  cats.forEach(function(c) {
    out[c.class] = (out[c.class] || 0) + (c.share_pct || 0);
  });

  // For convertibles & dividend: sum share_pct of matching funds via taxonomy
  const tax = _taxonomyFunds || {};
  function subsetPct(predicate) {
    let sum = 0;
    cats.forEach(function(c) {
      (c.funds || []).forEach(function(f) {
        const t = tax[f.code] || {};
        if (predicate(t) && f.share_pct) sum += f.share_pct;
      });
    });
    return sum;
  }

  out.__convertibles    = subsetPct(function(t) { return t.l3 === '可转债'; });
  out.__dividend_lowvol = subsetPct(function(t) { return t.l2 === '价值红利'; });
  return out;
}

function actualForAxis(axisId, actualMap) {
  switch (axisId) {
    case 'a_stock':         return actualMap['A股']       || 0;
    case 'em_overseas':     return actualMap['海外新兴']  || 0;
    case 'dm_overseas':     return actualMap['海外成熟']  || 0;
    case 'commodities':     return actualMap['商品']      || 0;
    case 'bonds':           return actualMap['债券']      || 0;
    case 'cash':            return actualMap['现金']      || 0;
    case 'convertibles':    return actualMap.__convertibles    || 0;
    case 'dividend_lowvol': return actualMap.__dividend_lowvol || 0;
    default: return 0;
  }
}

function gapInfo(actual, axis) {
  const lo = axis.min_pct, hi = axis.max_pct;
  if (lo == null || hi == null) {
    return { status: 'na', label: '基线缺失', cssClass: 'ins-gap-na', delta: null };
  }
  if (actual < lo) {
    return { status: 'under', label: '欠配 ' + (lo - actual).toFixed(1) + 'pp',
             cssClass: 'ins-gap-under', delta: actual - lo };
  }
  if (actual > hi) {
    return { status: 'over', label: '超配 ' + (actual - hi).toFixed(1) + 'pp',
             cssClass: 'ins-gap-over', delta: actual - hi };
  }
  return { status: 'in', label: '符合区间', cssClass: 'ins-gap-in', delta: 0 };
}

function renderInsightsTab() {
  const el = document.getElementById('tab-insights');
  if (!el) return;

  if (!_baseline || !_allocation) {
    el.innerHTML = '<div class="ins-wrap">'
      + '<div class="ins-disclaimer">⚠️ 基线或持仓数据尚未加载。'
      + '请检查 <code>docs/allocation_baseline.json</code> 是否存在。</div></div>';
    return;
  }

  const actualMap = computeActualAllocation();
  const baselineById = {};
  (_baseline.axes || []).forEach(function(a) { baselineById[a.id] = a; });

  // Build radar indicators & series (capped at 50% so the chart doesn't collapse)
  const indicators = INSIGHT_AXES.map(function(ax) {
    const b = baselineById[ax.id] || {};
    const actual = actualForAxis(ax.id, actualMap);
    const axisMax = Math.max(50, Math.ceil(Math.max(actual, b.max_pct || 0) * 1.2 / 10) * 10);
    return { name: ax.label, max: axisMax, _axisId: ax.id };
  });

  const actualData = INSIGHT_AXES.map(function(ax) {
    return Math.round(actualForAxis(ax.id, actualMap) * 10) / 10;
  });
  const baselineMin = INSIGHT_AXES.map(function(ax) {
    const b = baselineById[ax.id] || {};
    return b.min_pct != null ? b.min_pct : null;
  });
  const baselineMax = INSIGHT_AXES.map(function(ax) {
    const b = baselineById[ax.id] || {};
    return b.max_pct != null ? b.max_pct : null;
  });

  // Gap table rows
  const rows = INSIGHT_AXES.map(function(ax) {
    const b = baselineById[ax.id] || {};
    const actual = actualForAxis(ax.id, actualMap);
    const gap = gapInfo(actual, b);
    const rangeStr = (b.min_pct != null && b.max_pct != null)
      ? b.min_pct.toFixed(0) + '%–' + b.max_pct.toFixed(0) + '%'
      : '—';
    const confClass = 'ins-conf-' + (b.confidence || 'low');
    const confText  = { high: '高', medium: '中', low: '低' }[b.confidence || 'low'];
    return '<tr onclick="toggleInsightQuotes(\'' + ax.id + '\')" id="ins-row-' + ax.id + '">'
      + '<td><span class="ins-axis-label">' + escHtml(ax.label) + '</span></td>'
      + '<td class="ins-actual">' + actual.toFixed(1) + '%</td>'
      + '<td class="ins-range">' + rangeStr + '</td>'
      + '<td><span class="ins-conf ' + confClass + '">' + confText + '</span></td>'
      + '<td><span class="ins-gap-badge ' + gap.cssClass + '">' + gap.label + '</span></td>'
      + '<td style="color:#999;font-size:11px">' + ((b.sources && b.sources.length) || 0) + ' 条引用 ▸</td>'
    + '</tr>'
    + '<tr id="ins-quotes-' + ax.id + '" style="display:none"><td colspan="6" style="padding:0">'
      + '<div class="ins-quote-panel" id="ins-quote-panel-' + ax.id + '"></div>'
    + '</td></tr>';
  }).join('');

  // Aggregate stats
  const naCount = INSIGHT_AXES.filter(function(ax) {
    const b = baselineById[ax.id] || {};
    return b.min_pct == null;
  }).length;
  const stats = _baseline.extraction_stats || {};

  el.innerHTML = '<div class="ins-wrap">'
    + '<div class="ins-disclaimer">'
      + '<b>⚠️ 免责说明：</b>'
      + '本页面的"E大基线"为对 E大 公开文章的<b>启发式提取 + LLM 辅助分类</b>，'
      + '数值区间为对 E大 文章里"目标 / 上限 / 下限 / 区间"类语句的聚合，'
      + '不包含基于市场估值的动态调整，仅为研究辅助，<b>不构成任何投资建议</b>。'
      + 'E大 实际操作综合估值、技术面、宏观判断，远比规则复杂。'
    + '</div>'
    + '<div class="ins-card">'
      + '<div class="ins-card-title">配置对照雷达图 — ' + (_currentPlan === 's' ? '长赢S定投' : '长赢150份') + '</div>'
      + '<div class="ins-card-sub">蓝色实线 = 当前实际占比（按且慢权威份额）；红色虚线 = E大 基线区间上/下限。'
        + '轴外延伸表示超配，靠近中心表示欠配。</div>'
      + '<div class="ins-radar" id="insRadar"></div>'
      + '<div class="ins-legend">'
        + '<div class="ins-leg-item"><div class="ins-leg-line" style="background:#1677ff"></div>实际占比</div>'
        + '<div class="ins-leg-item"><div class="ins-leg-line" style="background:#ff4d4f;border-top:2px dashed #ff4d4f;height:0"></div>基线上限</div>'
        + '<div class="ins-leg-item"><div class="ins-leg-line" style="background:#ff9c9c;border-top:2px dashed #ff9c9c;height:0"></div>基线下限</div>'
      + '</div>'
    + '</div>'
    + '<div class="ins-card" style="padding:0;overflow:hidden">'
      + '<div style="padding:20px 20px 8px">'
        + '<div class="ins-card-title">逐轴缺口表 · 点击行查看 E大 原文引用</div>'
        + '<div class="ins-card-sub">缺口 = 实际 − 基线区间。蓝色 = 欠配 / 红色 = 超配 / 绿色 = 在区间内 / 灰色 = 基线缺失。</div>'
      + '</div>'
      + '<table class="ins-gap-table">'
        + '<thead><tr>'
          + '<th>资产类别</th><th>实际</th><th>E大 区间</th><th>置信度</th><th>缺口</th><th></th>'
        + '</tr></thead>'
        + '<tbody>' + rows + '</tbody>'
      + '</table>'
    + '</div>'
    + '<div class="ins-stats">'
      + '<span>扫描文章：' + (stats.articles_scanned || '—') + ' 篇</span>'
      + '<span>命中文章：' + (stats.articles_with_matches || '—') + ' 篇</span>'
      + '<span>基线缺失轴：' + naCount + ' / ' + INSIGHT_AXES.length + '</span>'
      + '<span>更新于：' + ((_baseline.updatedAt || '').slice(0, 10) || '—') + '</span>'
    + '</div>'
    + '</div>';

  // Init radar chart
  setTimeout(function() { initInsightsRadar(indicators, actualData, baselineMin, baselineMax); }, 0);
}

function initInsightsRadar(indicators, actualData, minData, maxData) {
  const container = document.getElementById('insRadar');
  if (!container) return;
  if (_insightsChart) { try { _insightsChart.dispose(); } catch (e) {} _insightsChart = null; }
  _insightsChart = echarts.init(container);
  container._chart = _insightsChart;

  _insightsChart.setOption({
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        const arr = p.value || [];
        let s = '<b>' + p.seriesName + '</b><br/>';
        indicators.forEach(function(ind, i) {
          s += ind.name + '：' + (arr[i] != null ? arr[i].toFixed(1) + '%' : '—') + '<br/>';
        });
        return s;
      }
    },
    radar: {
      indicator: indicators,
      shape: 'polygon',
      radius: '68%',
      center: ['50%', '54%'],
      axisName: { color: '#444', fontSize: 12, fontWeight: 500 },
      splitLine: { lineStyle: { color: '#e8e8e8' } },
      splitArea: { areaStyle: { color: ['#fafafa', '#fff'] } },
      axisLine: { lineStyle: { color: '#ddd' } }
    },
    series: [
      {
        name: 'E大 基线上限',
        type: 'radar',
        data: [{ value: maxData, name: '基线上限' }],
        lineStyle: { color: '#ff4d4f', width: 1.5, type: 'dashed' },
        itemStyle: { color: '#ff4d4f' },
        areaStyle: { color: 'rgba(255,77,79,0.04)' },
        symbol: 'none'
      },
      {
        name: 'E大 基线下限',
        type: 'radar',
        data: [{ value: minData, name: '基线下限' }],
        lineStyle: { color: '#ff9c9c', width: 1.5, type: 'dashed' },
        itemStyle: { color: '#ff9c9c' },
        areaStyle: { color: 'rgba(255,156,156,0.08)' },
        symbol: 'none'
      },
      {
        name: '当前实际',
        type: 'radar',
        data: [{ value: actualData, name: '当前实际' }],
        lineStyle: { color: '#1677ff', width: 2.5 },
        itemStyle: { color: '#1677ff' },
        areaStyle: { color: 'rgba(22,119,255,0.12)' },
        symbol: 'circle',
        symbolSize: 6
      }
    ]
  });
}

function toggleInsightQuotes(axisId) {
  const row = document.getElementById('ins-quotes-' + axisId);
  const mainRow = document.getElementById('ins-row-' + axisId);
  if (!row) return;
  const opening = row.style.display === 'none';
  row.style.display = opening ? 'table-row' : 'none';
  if (mainRow) mainRow.classList.toggle('expanded', opening);
  if (!opening) return;

  const panel = document.getElementById('ins-quote-panel-' + axisId);
  if (!panel || panel.dataset.loaded === '1') return;
  const ax = (_baseline.axes || []).find(function(a) { return a.id === axisId; });
  if (!ax || !ax.sources || ax.sources.length === 0) {
    panel.innerHTML = '<div class="ins-quote-empty">暂无来源引用 — 需人工补全基线。</div>';
    panel.dataset.loaded = '1';
    return;
  }
  panel.innerHTML = ax.sources.slice(0, 8).map(function(s) {
    return '<div class="ins-quote">'
      + '<div class="ins-quote-head">'
        + '<span class="ins-quote-date">' + escHtml(s.date || '') + '</span>'
        + '<span class="ins-quote-title">' + escHtml(s.title || '(无标题)') + '</span>'
        + '<span style="color:#bbb">#' + escHtml(String(s.article_id || '')) + '</span>'
      + '</div>'
      + '<div class="ins-quote-body">' + escHtml(s.quote || '') + '</div>'
      + (s.rule_extracted ? '<div class="ins-quote-rule">提取规则：' + escHtml(s.rule_extracted) + '</div>' : '')
    + '</div>';
  }).join('')
  + (ax.sources.length > 8
      ? '<div class="ins-quote-empty">其余 ' + (ax.sources.length - 8) + ' 条未展示。</div>'
      : '');
  panel.dataset.loaded = '1';
}

/* ── Analysis tab ── */
/* ── Allocation: 资产成分 (图1) ── */
function renderAllocationComposition() {
  if (!_allocation || !_allocation.current) return '';
  const cur = _allocation.current;
  const cats = (cur.by_category || []).filter(function(c) {
    // Show classes that have either current units OR cleared funds (累计收益参考)
    return c.units > 0 || (c.funds && c.funds.length > 0);
  });

  // Stacked bar (only segments with units > 0)
  const segs = cats.filter(function(c) { return c.share_pct > 0; });
  const totalShown = segs.reduce(function(a, c) { return a + c.share_pct; }, 0);
  const barHtml = '<div class="ac-bar">'
    + segs.map(function(c) {
        return '<div class="ac-seg" title="' + escHtml(c.label + ' ' + c.share_pct.toFixed(2) + '%') + '"'
          + ' style="width:' + c.share_pct + '%;background:' + c.color + '"></div>';
      }).join('')
    + '</div>'
    + '<div class="ac-legend">'
    + segs.map(function(c) {
        return '<span><span class="ac-leg-dot" style="background:' + c.color + '"></span>'
          + escHtml(c.label) + ' ' + c.share_pct.toFixed(2) + '%</span>';
      }).join('')
    + '</div>';

  // Helpers
  const fmtRet = function(r) {
    if (r === null || r === undefined) return { str: '-', color: '#999' };
    return {
      str:   (r >= 0 ? '+' : '') + r.toFixed(2) + '%',
      color: r >= 0 ? '#ff4d4f' : '#52c41a',
    };
  };
  // Build a {fundCode -> holdings record} index from the current plan's data.json
  const holdingByCode = {};
  if (_appData && _appData.holdings) {
    _appData.holdings.forEach(function(h) { holdingByCode[h.fundCode] = h; });
  }

  const fundRowHtml = function(f) {
    const fr = fmtRet(f.return_pct);
    const holding = holdingByCode[f.code];
    const history = holding ? (holding.history || []) : [];
    // Latest action: last item by date desc
    const sortedHist = history.slice().sort(function(a, b) { return b.date.localeCompare(a.date); });
    const latest = sortedHist[0];

    let lastActionHtml = '';
    if (latest) {
      const fullDate = latest.date || '';
      const act  = latest.action === 'buy' ? '买入' : '卖出';
      const link = latest.articleLink
        ? '<a class="ac-last-link" href="' + escHtml(latest.articleLink) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#x1F517;</a>'
        : '';
      lastActionHtml = '<span class="ac-last-action">'
        + '最近发车：' + fullDate + ' '
        + '<span class="ac-last-badge ' + latest.action + '">' + act + ' ' + (latest.unit || 1) + '份</span>'
        + ' ' + link
        + '</span>';
    } else if (f.last_trade) {
      lastActionHtml = '<span class="ac-trade-date">' + escHtml(f.last_trade) + '</span>';
    }

    // History rows for inline expansion
    const histRows = sortedHist.map(function(h) {
      const itemId = extractItemId(h.articleLink);
      const title = (itemId && _contentMap[itemId]) ? _contentMap[itemId].title : '';
      const link = h.articleLink
        ? '<a class="h-link" href="' + escHtml(h.articleLink) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#x1F517; 文章</a>'
        : '';
      return '<div class="ac-fund-history-row">'
        + '<span class="h-date">' + h.date + '</span>'
        + '<span class="h-action ' + h.action + '">' + (h.action === 'buy' ? '买入' : '卖出') + '</span>'
        + '<span class="h-unit">' + (h.unit || 1) + '份</span>'
        + '<span class="h-title">' + escHtml(title) + '</span>'
        + link
        + '</div>';
    }).join('');
    const histPanel = histRows
      ? '<div class="ac-fund-history" data-fund="' + escHtml(f.code) + '">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
        + '<span style="font-size:11px;color:#888">操作历史 · 共 ' + sortedHist.length + ' 笔</span>'
        + '<button class="ac-fund-chart-btn" onclick="event.stopPropagation();openChart(\'' + escHtml(f.code) + '\',\'' + escHtml(f.name) + '\')">查看净值图</button>'
        + '</div>' + histRows
        + '</div>'
      : '';

    const rowAttrs = ' data-fund="' + escHtml(f.code) + '"'
      + (history.length ? ' onclick="toggleFundRow(\'' + escHtml(f.code) + '\')"' : '');

    return '<div class="ac-fund-row"' + rowAttrs + '>'
      + (history.length ? '<span class="ac-fund-toggle">▶</span>' : '<span class="ac-fund-toggle" style="visibility:hidden">▶</span>')
      + '<div class="ac-fund-name">'
        + '<div class="ac-fund-name-line1">'
          + '<span class="ac-fund-name-label">' + escHtml(f.name) + '</span>'
          + '<span class="ac-fund-code">' + escHtml(f.code) + ' ' + escHtml(f.fullName || '') + '</span>'
          + (f.status === 'cleared' ? '<span class="ac-fund-cleared">已清仓</span>' : '')
        + '</div>'
        + (lastActionHtml ? '<div class="ac-fund-name-line2"><span class="ac-fund-name-label" style="visibility:hidden">' + escHtml(f.name) + '</span>' + lastActionHtml + '</div>' : '')
      + '</div>'
      + '<div class="ac-fund-units">' + (f.status === 'cleared' ? '-' : f.units + '份') + '</div>'
      + '<div class="ac-fund-share">' + (f.status === 'cleared' ? '-' : f.share_pct.toFixed(2) + '%') + '</div>'
      + '<div class="ac-fund-ret" style="color:' + fr.color + '">' + fr.str + '</div>'
      + '</div>'
      + histPanel;
  };

  // Per-L1 block: L2 sub-groups (collapsible, default collapsed) → L3 fund rows
  let l2Counter = 0;
  const blocks = cats.filter(function(c) { return c.class !== "现金"; }).map(function(c) {
    const cRet = fmtRet(c.return_pct);
    const head = '<div class="ac-cls-head">'
      + '<span class="ac-cls-dot" style="background:' + c.color + '"></span>'
      + '<span class="ac-cls-name">' + escHtml(c.label) + '</span>'
      + '<span class="ac-cls-meta">'
        + (c.units > 0 ? ' 共' + c.units + '份' : ' 已清仓')
        + ' · 占比 ' + c.share_pct.toFixed(2) + '%'
      + '</span>'
      + '<span class="ac-cls-ret" style="color:' + cRet.color + '">累计 ' + cRet.str + '</span>'
      + '</div>';

    // Group funds by L2
    const byL2 = {};
    const l2Order = [];
    (c.funds || []).forEach(function(f) {
      const k = f.l2 || '其他';
      if (!byL2[k]) { byL2[k] = []; l2Order.push(k); }
      byL2[k].push(f);
    });

    // Build a ranked L2 list: sort by aggregated active share desc, then by cleared count
    const l2Stats = l2Order.map(function(l2name) {
      const funds = byL2[l2name];
      const active = funds.filter(function(f){return f.status==='active';});
      const cleared = funds.filter(function(f){return f.status==='cleared';});
      const sumShare = active.reduce(function(a,f){return a+f.share_pct;}, 0);
      const sumUnits = active.reduce(function(a,f){return a+f.units;}, 0);
      // L2 累计 = active funds 按 share 加权平均；无 active 时取 cleared 平均
      let l2Ret = null;
      if (active.length) {
        const w = active.reduce(function(a,f){return a+(f.share_pct||0);}, 0) || 1;
        l2Ret = active.reduce(function(a,f){return a+(f.return_pct||0)*(f.share_pct||0);}, 0) / w;
      } else if (cleared.length) {
        const rets = cleared.map(function(f){return f.return_pct;}).filter(function(r){return r!=null;});
        if (rets.length) l2Ret = rets.reduce(function(a,r){return a+r;},0)/rets.length;
      }
      return { name: l2name, funds: active.concat(cleared), units: sumUnits, share: sumShare, ret: l2Ret, hasActive: active.length > 0 };
    }).sort(function(a,b){
      if (a.hasActive !== b.hasActive) return a.hasActive ? -1 : 1;
      return b.share - a.share;
    });

    const l2Blocks = l2Stats.map(function(s) {
      const r = fmtRet(s.ret);
      const meta = (s.hasActive ? s.units + '份 · ' + s.share.toFixed(2) + '%' : '已清仓')
        + (s.funds.length > 1 ? '  (' + s.funds.length + ' 只)' : '');
      // L2 head is always-visible (no toggle); collapse layer is L3 below
      const headHtml = '<div class="ac-l2-head">'
        + '<span class="ac-l2-name">' + escHtml(s.name) + '</span>'
        + '<span class="ac-l2-meta">' + meta + '</span>'
        + '<span class="ac-l2-ret" style="color:' + r.color + '">' + r.str + '</span>'
        + '</div>';
      // Group funds by L3 within this L2
      const byL3 = {};
      const l3Order = [];
      s.funds.forEach(function(f) {
        const k = f.l3 || '其他';
        if (!byL3[k]) { byL3[k] = []; l3Order.push(k); }
        byL3[k].push(f);
      });
      const l3Stats = l3Order.map(function(l3name) {
        const funds = byL3[l3name];
        const active = funds.filter(function(f){return f.status==='active';});
        const sumShare = active.reduce(function(a,f){return a+f.share_pct;}, 0);
        const sumUnits = active.reduce(function(a,f){return a+f.units;}, 0);
        let l3Ret = null;
        if (active.length) {
          const w = active.reduce(function(a,f){return a+(f.share_pct||0);}, 0) || 1;
          l3Ret = active.reduce(function(a,f){return a+(f.return_pct||0)*(f.share_pct||0);}, 0) / w;
        } else {
          const rets = funds.map(function(f){return f.return_pct;}).filter(function(r){return r!=null;});
          if (rets.length) l3Ret = rets.reduce(function(a,r){return a+r;},0)/rets.length;
        }
        return { name: l3name, funds: funds, units: sumUnits, share: sumShare, ret: l3Ret, hasActive: active.length > 0 };
      }).sort(function(a,b){
        if (a.hasActive !== b.hasActive) return a.hasActive ? -1 : 1;
        return b.share - a.share;
      });

      const l3Html = l3Stats.map(function(g) {
        // L3 header: skip when L3 name == L2 name (e.g. 原油/原油 redundant)
        const sameAsParent = g.name === s.name;
        const r = fmtRet(g.ret);
        const meta = (g.hasActive ? g.units + '份 · ' + g.share.toFixed(2) + '%' : '已清仓');
        const fundsHtml = g.funds.map(fundRowHtml).join('');
        if (sameAsParent) {
          // No L3 wrapper — funds attach directly under L2 (still collapsible? No — show inline)
          return '<div class="ac-l3-block"><div class="ac-l3-funds open">' + fundsHtml + '</div></div>';
        }
        const l3id = 'ac-l3-' + (l2Counter++);
        const head = '<div class="ac-l3-head" onclick="toggleL3(\'' + l3id + '\')">'
          + '<span class="ac-l3-toggle" id="' + l3id + '-tog">▶</span>'
          + '<span class="ac-l3-name">' + escHtml(g.name) + '</span>'
          + '<span class="ac-l3-meta">' + meta + '</span>'
          + '<span class="ac-l3-ret" style="color:' + r.color + '">' + r.str + '</span>'
          + '</div>';
        const fundsWrap = '<div class="ac-l3-funds" id="' + l3id + '">' + fundsHtml + '</div>';
        return '<div class="ac-l3-block">' + head + fundsWrap + '</div>';
      }).join('');

      const bodyHtml = '<div class="ac-l2-body">' + l3Html + '</div>';
      return '<div class="ac-l2-block">' + headHtml + bodyHtml + '</div>';
    }).join('');

    return '<div class="ac-cls-block">' + head + l2Blocks + '</div>';
  }).join('');

  return '<div class="card"><div class="card-title">资产成分</div>'
    + blocks
    + '<div style="font-size:11px;color:#aaa;margin-top:8px">'
    + (_allocation && _allocation._source === 'qieman'
        ? '✓ 数据来源：且慢官方 API（占比 / 累计收益率均为权威值）'
        : '* 占比 = 该资产当前估值 / 组合总估值。算法基于 adj_nav，与且慢官方略有偏差。')
    + '</div>'
    + '</div>';
}

/* L1 summary: stacked bar + legend + 已投/现金 — lifted to top of 资产配置 (shared across sub-tabs) */
function renderL1Summary() {
  if (!_allocation || !_allocation.current) return '';
  const cur = _allocation.current;
  const cats = (cur.by_category || []).filter(function(c) { return c.share_pct > 0; });
  const barHtml = '<div class="ac-bar">'
    + cats.map(function(c) {
        return '<div class="ac-seg" title="' + escHtml(c.label + ' ' + c.share_pct.toFixed(2) + '%') + '"'
